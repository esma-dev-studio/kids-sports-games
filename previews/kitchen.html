<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>パニックキッチン 〜まぜまぜ大混雑〜 — プレビュー</title>
<style>
:root{
  --surface-0:#f4f3ee; --surface-1:#fcfcfb; --surface-2:#ffffff;
  --text-primary:#0b0b0b; --text-secondary:#52514e; --text-muted:#898781;
  --text-accent:#185fa5; --bg-accent:#e6f1fb;
  --border:rgba(11,11,11,0.10); --border-strong:rgba(11,11,11,0.18);
  --border-accent:#378add; --radius:8px;
}
@media (prefers-color-scheme:dark){
  :root{
    --surface-0:#1a1a19; --surface-1:#232322; --surface-2:#2b2b29;
    --text-primary:#ffffff; --text-secondary:#c3c2b7; --text-muted:#8f8e88;
    --text-accent:#85b7eb; --bg-accent:#0c447c;
    --border:rgba(255,255,255,0.12); --border-strong:rgba(255,255,255,0.22);
    --border-accent:#3a86dd;
  }
}
html,body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
.page{max-width:740px;margin:0 auto;padding:18px 16px 40px;box-sizing:border-box;}
</style>
</head>
<body>
<div class="page">
<h2 class="kitchen-sr-only">食材キャラを正しい色のお皿にドラッグして仕分ける、まぜまぜ大混雑のキッチンゲームです。</h2>
<style>
  .kitchen-sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
  .kitchen-frame{background:var(--surface-1);border-radius:12px;padding:12px;}
  .kitchen-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin:0 2px 8px;flex-wrap:wrap;}
  .kitchen-title{font-size:15px;font-weight:700;color:var(--text-primary);}
  .kitchen-hint{font-size:12px;color:var(--text-secondary);}
  .kitchen-hint b{color:var(--text-primary);font-weight:600;}
  .kitchen-hint span{color:var(--text-muted);}
</style>
<div class="kitchen-frame">
  <div class="kitchen-head">
    <div class="kitchen-title">パニックキッチン 〜まぜまぜ大混雑〜</div>
    <div class="kitchen-hint">食材を<b>ドラッグ</b>して色の合うお皿へ！ <span>（放置でお手本デモ）</span></div>
  </div>
  <canvas id="kitchen-canvas" width="1040" height="620" style="display:block;width:100%;height:auto;border-radius:8px;"></canvas>
</div>
<script>
(function(){
  var cv=document.getElementById("kitchen-canvas");
  if(!cv||!cv.getContext){return;}
  var ctx=cv.getContext("2d");
  var W=1040,H=620;

  var STATIONS=[
    {key:"fruit",col:"#e5533c",light:"#f7b3a6",name:"フルーツ"},
    {key:"fish", col:"#3d84c6",light:"#a9cdec",name:"さかな"},
    {key:"bread",col:"#e0a12a",light:"#f2d79a",name:"パン"},
    {key:"leaf", col:"#4caa5a",light:"#b3ddba",name:"やさい"}
  ];

  var plates=[];
  function layoutPlates(){
    var n=STATIONS.length;
    var gap=24, marginX=70;
    var pw=(W-marginX*2-gap*(n-1))/n;
    var order=[0,1,2,3].sort(function(){return Math.random()-0.5;});
    plates=[];
    for(var i=0;i<n;i++){
      var s=STATIONS[order[i]];
      plates.push({
        s:s, x:marginX+i*(pw+gap), y:H-150, w:pw, h:118,
        fill:0, need:4, done:0, glow:0, shakeGlow:0
      });
    }
  }
  layoutPlates();

  var items=[];
  var particles=[];
  var floaters=[];
  var score=0, combo=0, patience=1.0;
  var flash=0;
  var t=0;
  var spawnTimer=0;
  var shuffleTimer=0;

  var held=null;
  var pointerX=W/2, pointerY=H/2, pointerDown=false;
  var lastHuman=-99999;
  var autoMode=true;
  var autoTarget=null;
  var ghostX=W/2, ghostY=H/2, ghostVisX=W/2, ghostVisY=H/2;
  var ghostHold=null;

  function rnd(a,b){return a+Math.random()*(b-a);}
  function pick(a){return a[(Math.random()*a.length)|0];}

  function spawnItem(){
    if(items.length>6){return;}
    var s=pick(STATIONS);
    var side=pick(["top","left","right"]);
    var sx,sy,vx,vy;
    if(side==="top"){sx=rnd(180,W-180);sy=-30;vx=rnd(-1.2,1.2);vy=rnd(1.5,2.6);}
    else if(side==="left"){sx=-30;sy=rnd(60,220);vx=rnd(2.4,3.4);vy=rnd(-1.0,0.6);}
    else {sx=W+30;sy=rnd(60,220);vx=-rnd(2.4,3.4);vy=rnd(-1.0,0.6);}
    items.push({
      key:s.key,col:s.col,light:s.light,name:s.name,
      x:sx,y:sy,vx:vx,vy:vy,r:30,
      state:"fly",
      settleY:rnd(150,300)+((side==="top")?0:120),
      wob:rnd(0,6.28), blink:rnd(0,200), grabbed:false
    });
  }

  function iconFor(key,x,y,r,cx){
    cx.save();
    cx.translate(x,y);
    if(key==="fruit"){
      cx.fillStyle="#c53a26";cx.beginPath();cx.arc(0,2,r*0.62,0,6.28);cx.fill();
      cx.strokeStyle="#7a4a1e";cx.lineWidth=3;cx.beginPath();cx.moveTo(0,-r*0.5);cx.lineTo(4,-r*0.78);cx.stroke();
      cx.fillStyle="#5ab24f";cx.beginPath();cx.ellipse(11,-r*0.72,7,4,0.5,0,6.28);cx.fill();
    }else if(key==="fish"){
      cx.fillStyle="#2f6fa8";cx.beginPath();cx.ellipse(-3,2,r*0.6,r*0.4,0,0,6.28);cx.fill();
      cx.beginPath();cx.moveTo(r*0.5,2);cx.lineTo(r*0.86,-r*0.32);cx.lineTo(r*0.86,r*0.36);cx.closePath();cx.fill();
    }else if(key==="bread"){
      cx.fillStyle="#c98a1e";cx.beginPath();
      cx.moveTo(-r*0.6,r*0.3);cx.quadraticCurveTo(-r*0.6,-r*0.55,0,-r*0.55);
      cx.quadraticCurveTo(r*0.6,-r*0.55,r*0.6,r*0.3);cx.closePath();cx.fill();
      cx.fillStyle="#e9c07a";cx.fillRect(-r*0.6,r*0.15,r*1.2,r*0.2);
    }else{
      cx.fillStyle="#3f9a4d";
      cx.beginPath();
      cx.moveTo(0,-r*0.6);
      cx.quadraticCurveTo(r*0.7,-r*0.2,0,r*0.6);
      cx.quadraticCurveTo(-r*0.7,-r*0.2,0,-r*0.6);cx.fill();
      cx.strokeStyle="#2c6e37";cx.lineWidth=2.5;cx.beginPath();cx.moveTo(0,-r*0.4);cx.lineTo(0,r*0.5);cx.stroke();
    }
    cx.restore();
  }

  function drawItem(it){
    var bob=Math.sin(t*0.12+it.wob)*3;
    var x=it.x, y=it.y+ (it.state==="fly"?bob:0);
    ctx.save();
    ctx.shadowColor="rgba(0,0,0,0.18)";ctx.shadowBlur=8;ctx.shadowOffsetY=4;
    ctx.fillStyle=it.light;
    ctx.beginPath();ctx.arc(x,y,it.r,0,6.28);ctx.fill();
    ctx.restore();
    ctx.strokeStyle=it.col;ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(x,y,it.r,0,6.28);ctx.stroke();
    iconFor(it.key,x,y-2,it.r,ctx);
    var blinkOn=(Math.floor((t+it.blink))%120)<7;
    var ey=y-it.r*0.28;
    ctx.fillStyle="#fff";
    ctx.beginPath();ctx.arc(x-8,ey,6,0,6.28);ctx.arc(x+8,ey,6,0,6.28);ctx.fill();
    ctx.fillStyle="#222";
    if(blinkOn){
      ctx.lineWidth=2;ctx.strokeStyle="#222";
      ctx.beginPath();ctx.moveTo(x-12,ey);ctx.lineTo(x-4,ey);ctx.moveTo(x+4,ey);ctx.lineTo(x+12,ey);ctx.stroke();
    }else{
      var lookx=(it.state==="held")?2:Math.sin(t*0.05+it.wob)*2;
      ctx.beginPath();ctx.arc(x-8+lookx,ey+1,3,0,6.28);ctx.arc(x+8+lookx,ey+1,3,0,6.28);ctx.fill();
    }
    ctx.fillStyle="rgba(230,90,70,0.35)";
    ctx.beginPath();ctx.arc(x-it.r*0.55,y+3,4,0,6.28);ctx.arc(x+it.r*0.55,y+3,4,0,6.28);ctx.fill();
  }

  function drawPlate(p){
    var cx=p.x+p.w/2, cy=p.y+p.h*0.42;
    ctx.fillStyle="#fff";
    roundRect(p.x+p.w/2-46,p.y-42,92,30,7);ctx.fill();
    ctx.strokeStyle="rgba(0,0,0,0.12)";ctx.lineWidth=1.5;
    roundRect(p.x+p.w/2-46,p.y-42,92,30,7);ctx.stroke();
    for(var k=0;k<p.need;k++){
      var mx=p.x+p.w/2-30+k*20;
      var filled=k<p.fill;
      ctx.globalAlpha=filled?1:0.28;
      iconFor(p.s.key,mx,p.y-27,13,ctx);
      ctx.globalAlpha=1;
    }
    ctx.fillStyle="rgba(0,0,0,0.10)";
    ctx.beginPath();ctx.ellipse(cx,p.y+p.h*0.72,p.w*0.46,16,0,0,6.28);ctx.fill();
    var pop=1+p.shakeGlow*0.05;
    ctx.save();
    ctx.translate(cx,cy);ctx.scale(pop,pop);ctx.translate(-cx,-cy);
    ctx.fillStyle="#ffffff";
    ctx.beginPath();ctx.ellipse(cx,cy,p.w*0.46,p.h*0.34,0,0,6.28);ctx.fill();
    ctx.fillStyle=p.s.light;
    ctx.beginPath();ctx.ellipse(cx,cy,p.w*0.33,p.h*0.24,0,0,6.28);ctx.fill();
    ctx.lineWidth=5;ctx.strokeStyle=p.s.col;
    ctx.beginPath();ctx.ellipse(cx,cy,p.w*0.46,p.h*0.34,0,0,6.28);ctx.stroke();
    iconFor(p.s.key,cx,cy,20,ctx);
    ctx.restore();
    var gy=p.y+p.h-4;
    ctx.fillStyle="rgba(0,0,0,0.10)";
    roundRect(p.x+10,gy,p.w-20,10,5);ctx.fill();
    ctx.fillStyle=p.s.col;
    var gw=(p.w-20)*(p.fill/p.need);
    if(gw>0){roundRect(p.x+10,gy,gw,10,5);ctx.fill();}
    ctx.fillStyle="#5b5b5b";
    ctx.font="600 15px system-ui,sans-serif";ctx.textAlign="center";
    ctx.fillText(p.s.name,cx,cy+p.h*0.5+4);
    if(p.glow>0){
      ctx.globalAlpha=p.glow;
      ctx.strokeStyle=p.s.col;ctx.lineWidth=6;
      ctx.beginPath();ctx.ellipse(cx,cy,p.w*0.46+ (1-p.glow)*40,p.h*0.34+(1-p.glow)*30,0,0,6.28);ctx.stroke();
      ctx.globalAlpha=1;
    }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
  }

  function burst(x,y,col,n){
    for(var i=0;i<n;i++){
      var a=rnd(0,6.28),sp=rnd(1.5,5);
      particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,col:col,r:rnd(2.5,5)});
    }
  }

  function plateAt(x,y){
    for(var i=0;i<plates.length;i++){
      var p=plates[i];
      if(x>p.x-6&&x<p.x+p.w+6&&y>p.y-50&&y<p.y+p.h+6){return p;}
    }
    return null;
  }

  function tryPlace(it,p){
    if(!p){
      it.state="fly";it.vx=0;it.vy=2;it.grabbed=false;
      return;
    }
    if(p.s.key===it.key && p.fill<p.need){
      p.fill++; p.shakeGlow=1;
      combo++;
      var gain=10+combo*2;
      score+=gain;
      flash=0.35;
      burst(it.x,it.y,p.s.col,10);
      floaters.push({x:it.x,y:it.y-20,txt:"+"+gain,col:p.s.col,life:1});
      if(combo>=2){floaters.push({x:it.x,y:it.y-46,txt:combo+" コンボ!",col:"#e08a1a",life:1});}
      it.state="gone";
      if(p.fill>=p.need){
        completePlate(p);
      }
    }else{
      combo=0;
      patience=Math.max(0,patience-0.12);
      burst(it.x,it.y,"#999",6);
      floaters.push({x:it.x,y:it.y-20,txt:"ちがう！",col:"#c0392b",life:1});
      it.state="fly";it.vx=rnd(-1,1);it.vy=-3;it.grabbed=false;
    }
  }

  function completePlate(p){
    p.glow=1; p.done++;
    score+=50;
    flash=0.6;
    burst(p.x+p.w/2,p.y+p.h*0.4,p.s.col,26);
    floaters.push({x:p.x+p.w/2,y:p.y-10,txt:"できあがり!",col:p.s.col,life:1.4});
    patience=Math.min(1,patience+0.12);
    setTimeout(function(){ p.fill=0; }, 550);
  }

  function toCanvas(ev){
    var r=cv.getBoundingClientRect();
    var cx=(ev.clientX-r.left)*(W/r.width);
    var cy=(ev.clientY-r.top)*(H/r.height);
    return {x:cx,y:cy};
  }
  function grabAt(x,y){
    var best=null,bd=1e9;
    for(var i=0;i<items.length;i++){
      var it=items[i];
      if(it.state==="gone"||it.state==="held"){continue;}
      var d=(it.x-x)*(it.x-x)+(it.y-y)*(it.y-y);
      if(d<bd&&d<3600){bd=d;best=it;}
    }
    return best;
  }
  cv.addEventListener("pointerdown",function(ev){
    ev.preventDefault();
    lastHuman=t; autoMode=false; releaseAuto();
    var p=toCanvas(ev);pointerX=p.x;pointerY=p.y;pointerDown=true;
    var g=grabAt(p.x,p.y);
    if(g){held=g;held.state="held";held.grabbed=true;}
  });
  cv.addEventListener("pointermove",function(ev){
    var p=toCanvas(ev);pointerX=p.x;pointerY=p.y;
    if(held){lastHuman=t;}
  });
  function dropHeld(){
    if(held){
      var p=plateAt(held.x,held.y);
      tryPlace(held,p);
      held=null;
    }
    pointerDown=false;
  }
  cv.addEventListener("pointerup",function(ev){lastHuman=t;dropHeld();});
  cv.addEventListener("pointercancel",function(){dropHeld();});
  cv.addEventListener("pointerleave",function(){if(held){dropHeld();}});

  function releaseAuto(){
    if(ghostHold){ghostHold.grabbed=false;ghostHold.state="fly";ghostHold.vx=0;ghostHold.vy=1;ghostHold=null;}
    autoTarget=null;
  }

  function matchPlate(key){
    for(var i=0;i<plates.length;i++){if(plates[i].s.key===key&&plates[i].fill<plates[i].need){return plates[i];}}
    return null;
  }

  function autoStep(){
    if(!ghostHold){
      var cand=null,cd=1e9;
      for(var i=0;i<items.length;i++){
        var it=items[i];
        if(it.state!=="fly")continue;
        var pl=matchPlate(it.key);
        if(!pl)continue;
        var d=(it.x-ghostX)*(it.x-ghostX)+(it.y-ghostY)*(it.y-ghostY);
        if(d<cd){cd=d;cand=it;}
      }
      if(cand){
        ghostX+=(cand.x-ghostX)*0.18;
        ghostY+=(cand.y-ghostY)*0.18;
        if(Math.abs(cand.x-ghostX)<26&&Math.abs(cand.y-ghostY)<26){
          ghostHold=cand;cand.state="held";cand.grabbed=true;
        }
      }else{
        ghostX+=(W/2-ghostX)*0.05;
        ghostY+=(H*0.4-ghostY)*0.05;
      }
    }else{
      var p=matchPlate(ghostHold.key);
      if(!p){p=plates[0];}
      var tx=p.x+p.w/2, ty=p.y+p.h*0.3;
      ghostX+=(tx-ghostX)*0.16;
      ghostY+=(ty-ghostY)*0.16;
      ghostHold.x=ghostX;ghostHold.y=ghostY;
      if(Math.abs(tx-ghostX)<24&&Math.abs(ty-ghostY)<24){
        tryPlace(ghostHold,p);
        ghostHold=null;
      }
    }
  }

  function update(){
    t++;
    if(!autoMode && (t-lastHuman)>180 && !held){autoMode=true;}
    spawnTimer--;
    if(spawnTimer<=0){spawnItem();spawnTimer=Math.max(28,70-score*0.02);}
    shuffleTimer++;
    if(shuffleTimer>640){
      shuffleTimer=0;
      if(plates.length>1){
        var a=(Math.random()*plates.length)|0,b=(Math.random()*plates.length)|0;
        if(a!==b){
          var ax=plates[a].x,aw=plates[a].w;
          plates[a].x=plates[b].x;plates[a].w=plates[b].w;
          plates[b].x=ax;plates[b].w=aw;
          plates[a].shakeGlow=1;plates[b].shakeGlow=1;
          floaters.push({x:W/2,y:H-210,txt:"シャッフル!",col:"#7a5cc0",life:1.4});
        }
      }
    }

    if(autoMode){autoStep();}

    if(held){held.x+=(pointerX-held.x)*0.4;held.y+=(pointerY-held.y)*0.4;}

    ghostVisX+=(ghostX-ghostVisX)*0.3;
    ghostVisY+=(ghostY-ghostVisY)*0.3;

    for(var i=items.length-1;i>=0;i--){
      var it=items[i];
      if(it.state==="gone"){items.splice(i,1);continue;}
      if(it.state==="fly"){
        it.vy+=0.055;
        it.x+=it.vx;it.y+=it.vy;
        if(it.y>it.settleY && it.vy>0 && it.y<H-190){
          it.vy*=-0.32;it.y=it.settleY;it.vx*=0.7;
          if(Math.abs(it.vy)<0.6)it.vy=0;
        }
        if(it.y>H+40){
          combo=0;patience=Math.max(0,patience-0.08);
          floaters.push({x:it.x,y:H-120,txt:"おっと！",col:"#c0392b",life:1});
          items.splice(i,1);continue;
        }
        if(it.x<-60||it.x>W+60){items.splice(i,1);continue;}
      }
    }

    patience=Math.max(0,patience-0.00035);
    if(patience<=0){
      patience=1;combo=0;
      floaters.push({x:W/2,y:H/2,txt:"ひとやすみ〜",col:"#e08a1a",life:1.6});
    }

    for(var j=particles.length-1;j>=0;j--){
      var pa=particles[j];
      pa.vy+=0.14;pa.x+=pa.vx;pa.y+=pa.vy;pa.life-=0.03;
      if(pa.life<=0)particles.splice(j,1);
    }
    for(var f=floaters.length-1;f>=0;f--){
      floaters[f].y-=0.7;floaters[f].life-=0.016;
      if(floaters[f].life<=0)floaters.splice(f,1);
    }
    for(var q=0;q<plates.length;q++){
      if(plates[q].glow>0)plates[q].glow-=0.02;
      if(plates[q].shakeGlow>0)plates[q].shakeGlow-=0.05;
    }
    if(flash>0)flash-=0.03;
  }

  function drawScene(){
    ctx.fillStyle="#fdf3e3";ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#f6e6cf";
    for(var y=0;y<H-200;y+=52){
      for(var x=((y/52)%2===0?0:34);x<W;x+=68){
        roundRect(x+4,y+4,60,44,6);ctx.fill();
      }
    }
    ctx.fillStyle="#c98f5a";ctx.fillRect(0,H-200,W,200);
    ctx.fillStyle="#b87d47";ctx.fillRect(0,H-200,W,14);
    ctx.fillStyle="rgba(255,255,255,0.06)";
    for(var cxx=0;cxx<W;cxx+=90){ctx.fillRect(cxx,H-186,44,186);}
    ctx.fillStyle="rgba(255,255,255,0.28)";
    for(var s=0;s<4;s++){
      var wx=120+s*260+Math.sin(t*0.02+s)*20;
      ctx.beginPath();ctx.ellipse(wx,60+Math.sin(t*0.03+s)*10,26,14,0,0,6.28);ctx.fill();
    }
  }

  function drawHUD(){
    ctx.fillStyle="rgba(255,255,255,0.92)";
    roundRect(18,16,196,54,12);ctx.fill();
    ctx.fillStyle="#7a5230";ctx.font="600 14px system-ui,sans-serif";ctx.textAlign="left";
    ctx.fillText("スコア",34,38);
    ctx.fillStyle="#3a2a18";ctx.font="700 26px system-ui,sans-serif";
    ctx.fillText(String(score),34,62);
    if(combo>=2){
      ctx.fillStyle="#e08a1a";ctx.font="700 20px system-ui,sans-serif";ctx.textAlign="right";
      ctx.fillText(combo+" コンボ",200,56);
    }
    var mx=W-266,my=24,mw=248,mh=22;
    ctx.fillStyle="rgba(255,255,255,0.92)";
    roundRect(mx-10,my-8,mw+20,mh+34,12);ctx.fill();
    ctx.fillStyle="#7a5230";ctx.font="600 13px system-ui,sans-serif";ctx.textAlign="left";
    ctx.fillText("がまんメーター",mx,my-12+8);
    ctx.fillStyle="rgba(0,0,0,0.10)";
    roundRect(mx,my+14,mw,mh,11);ctx.fill();
    var pc = patience>0.5?"#4caa5a":(patience>0.25?"#e0a12a":"#e5533c");
    ctx.fillStyle=pc;
    if(patience>0.02){roundRect(mx,my+14,mw*patience,mh,11);ctx.fill();}
    if(autoMode){
      ctx.fillStyle="rgba(122,92,192,0.92)";
      roundRect(W/2-70,16,140,30,15);ctx.fill();
      ctx.fillStyle="#fff";ctx.font="700 14px system-ui,sans-serif";ctx.textAlign="center";
      ctx.fillText("お手本デモ中",W/2,36);
    }
  }

  function drawGhostHand(){
    var x=ghostVisX,y=ghostVisY;
    ctx.save();
    ctx.globalAlpha=0.9;
    ctx.fillStyle="#7a5cc0";
    ctx.beginPath();ctx.arc(x,y,14,0,6.28);ctx.fill();
    ctx.fillStyle="#fff";
    ctx.beginPath();ctx.arc(x,y,7,0,6.28);ctx.fill();
    ctx.strokeStyle="rgba(122,92,192,0.5)";ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(x,y,20+Math.sin(t*0.15)*3,0,6.28);ctx.stroke();
    ctx.restore();
  }

  function render(){
    drawScene();
    for(var i=0;i<plates.length;i++){drawPlate(plates[i]);}
    for(var a=0;a<items.length;a++){if(items[a].state!=="held")drawItem(items[a]);}
    for(var j=0;j<particles.length;j++){
      var pa=particles[j];
      ctx.globalAlpha=Math.max(0,pa.life);
      ctx.fillStyle=pa.col;
      ctx.beginPath();ctx.arc(pa.x,pa.y,pa.r,0,6.28);ctx.fill();
    }
    ctx.globalAlpha=1;
    for(var b=0;b<items.length;b++){if(items[b].state==="held"){
      var p=plateAt(items[b].x,items[b].y);
      if(p){
        ctx.strokeStyle=(p.s.key===items[b].key)?p.s.col:"#c0392b";
        ctx.lineWidth=4;ctx.setLineDash([8,6]);
        ctx.strokeRect(p.x+4,p.y-46,p.w-8,p.h+50);ctx.setLineDash([]);
      }
      drawItem(items[b]);
    }}
    if(autoMode){drawGhostHand();}
    drawHUD();
    for(var f=0;f<floaters.length;f++){
      var fl=floaters[f];
      ctx.globalAlpha=Math.max(0,Math.min(1,fl.life));
      ctx.fillStyle=fl.col;
      ctx.font="700 22px system-ui,sans-serif";ctx.textAlign="center";
      ctx.fillText(fl.txt,fl.x,fl.y);
    }
    ctx.globalAlpha=1;
    if(flash>0){
      ctx.fillStyle="rgba(255,255,255,"+(flash*0.5)+")";
      ctx.fillRect(0,0,W,H);
    }
  }

  var running=true;
  function loop(){
    if(!running)return;
    update();render();
    requestAnimationFrame(loop);
  }
  for(var s0=0;s0<3;s0++){spawnItem();}
  requestAnimationFrame(loop);
})();
</script>
</div>
</body>
</html>
