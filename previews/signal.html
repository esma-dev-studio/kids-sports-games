<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>まもれ！シグナル・ヒーロー — プレビュー</title>
<style>
:root{
  --surface-0:#f4f3ee; --surface-1:#fcfcfb; --surface-2:#ffffff;
  --text-primary:#0b0b0b; --text-secondary:#52514e; --text-muted:#898781;
  --text-accent:#185fa5; --bg-accent:#e6f1fb;
  --border:rgba(11,11,11,0.10); --border-strong:rgba(11,11,11,0.18);
  --border-accent:#378add; --radius:8px;
}
@media (prefers-color-scheme:dark){
  :root{
    --surface-0:#1a1a19; --surface-1:#232322; --surface-2:#2b2b29;
    --text-primary:#ffffff; --text-secondary:#c3c2b7; --text-muted:#8f8e88;
    --text-accent:#85b7eb; --bg-accent:#0c447c;
    --border:rgba(255,255,255,0.12); --border-strong:rgba(255,255,255,0.22);
    --border-accent:#3a86dd;
  }
}
html,body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
.page{max-width:740px;margin:0 auto;padding:18px 16px 40px;box-sizing:border-box;}
</style>
</head>
<body>
<div class="page">
<h2 class="signal-sr-only">円形リングに光るノードのうち、味方の丸だけをタップし、敵のバツは触らず見送る子ども向け反応ゲームのミニプレビュー。</h2>
<div class="signal-wrap">
  <div class="signal-frame">
    <div class="signal-head">
      <div class="signal-title">まもれ！シグナル・ヒーロー</div>
      <div class="signal-hint">丸(○)を叩く・バツ(×)は触らず待つ／放置でお手本デモ</div>
    </div>
    <canvas id="signal-canvas" width="1040" height="620" style="display:block;width:100%;height:auto;border-radius:8px;"></canvas>
    <div class="signal-legend">
      <span class="signal-key"><span class="signal-dot signal-dot-go"></span>味方 GO ○ = 叩く</span>
      <span class="signal-key"><span class="signal-dot signal-dot-no"></span>敵 NO-GO × = 待つ</span>
    </div>
  </div>
</div>
<style>
.signal-sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.signal-wrap{max-width:680px;margin:0 auto;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
.signal-frame{background:var(--surface-1);border-radius:12px;padding:12px;box-sizing:border-box;}
.signal-head{display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:6px;margin-bottom:10px;}
.signal-title{font-size:17px;font-weight:700;color:var(--text-primary);}
.signal-hint{font-size:12px;color:var(--text-secondary);}
.signal-legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:10px;}
.signal-key{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-muted);}
.signal-dot{width:13px;height:13px;border-radius:50%;display:inline-block;}
.signal-dot-go{background:#1fa88a;}
.signal-dot-no{background:#e2564a;}
</style>
<script>
(function(){
  var canvas = document.getElementById('signal-canvas');
  if(!canvas || !canvas.getContext){ return; }
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var CX = W*0.5, CY = H*0.5 + 6;
  var RING = 210;
  var NODE_R = 40;
  var NODE_COUNT = 7;

  var COL = {
    court:'#e8f2ee', courtRing:'#cfe3db', courtLine:'#bcd6cc',
    idle:'#c3d4cd', idleEdge:'#a9c2b8',
    go:'#1fa88a', goEdge:'#14806b', goGlow:'rgba(31,168,138,0.30)',
    nogo:'#e2564a', nogoEdge:'#b83a30', nogoGlow:'rgba(226,86,74,0.28)',
    ink:'#0f2f28', white:'#ffffff',
    gold:'#f4b740', spark:'#7fe0c8'
  };

  var nodes = [];
  for(var i=0;i<NODE_COUNT;i++){
    var a = -Math.PI/2 + i*(Math.PI*2/NODE_COUNT);
    nodes.push({ x:CX+Math.cos(a)*RING, y:CY+Math.sin(a)*RING, a:a });
  }

  var state = {
    active:-1, type:0, t:0, dur:1.1, phase:'wait', gap:0.45,
    score:0, combo:0, patience:0, dispScore:0,
    flash:0, flashCol:COL.goGlow, judged:false
  };
  var parts = [];
  var rings = [];
  var floats = [];

  var auto = true;
  var lastInput = -999;
  var now = 0;
  var ghostDelay = 0;
  var ghost = { x:CX, y:CY, tx:CX, ty:CY, show:0, press:0 };

  function pickNext(){
    var idx;
    do { idx = (Math.random()*NODE_COUNT)|0; } while(idx===state.active);
    state.active = idx;
    state.type = Math.random() < 0.62 ? 1 : 0;
    state.t = 0;
    state.dur = state.type===1 ? (0.85 + Math.random()*0.5) : (0.95 + Math.random()*0.4);
    state.phase = 'lit';
    state.judged = false;
    if(auto){
      var n = nodes[idx];
      if(state.type===1){
        ghostDelay = 0.18 + Math.random()*0.16;
      } else {
        ghostDelay = 999;
      }
      ghost.tx = n.x; ghost.ty = n.y;
    }
  }

  function spawnBurst(x,y,color,count){
    for(var i=0;i<count;i++){
      var an = Math.random()*Math.PI*2;
      var sp = 60 + Math.random()*160;
      parts.push({ x:x, y:y, vx:Math.cos(an)*sp, vy:Math.sin(an)*sp, life:1, r:3+Math.random()*3, col:color });
    }
  }
  function spawnRing(x,y,color){ rings.push({ x:x, y:y, r:NODE_R*0.6, life:1, col:color }); }
  function spawnFloat(x,y,text,color){ floats.push({ x:x, y:y, text:text, life:1, col:color }); }

  function judgeTap(idx, byGhost){
    if(idx!==state.active || state.phase!=='lit' || state.judged){ return; }
    var n = nodes[idx];
    if(state.type===1){
      state.judged = true;
      state.score += 10 + state.combo*2;
      state.combo += 1;
      state.flash = 1; state.flashCol = COL.goGlow;
      spawnBurst(n.x,n.y,COL.spark,14);
      spawnBurst(n.x,n.y,COL.gold,6);
      spawnRing(n.x,n.y,COL.go);
      spawnFloat(n.x,n.y-NODE_R, '+'+(10+(state.combo-1)*2), COL.go);
      if(state.combo>=2){ spawnFloat(CX,CY+58, state.combo+' COMBO', COL.gold); }
      state.phase='clear'; state.t=0;
    } else {
      state.judged = true;
      state.combo = 0;
      state.flash = 1; state.flashCol = COL.nogoGlow;
      spawnBurst(n.x,n.y,COL.nogo,10);
      spawnFloat(n.x,n.y-NODE_R,'MISS',COL.nogo);
      state.phase='clear'; state.t=0;
    }
  }

  function expire(){
    var n = nodes[state.active];
    if(state.type===0 && !state.judged){
      state.patience += 1;
      state.score += 3;
      spawnRing(n.x,n.y,COL.nogo);
      spawnFloat(n.x,n.y-NODE_R,'GA-MAN!',COL.nogoEdge);
      if(state.patience%3===0){ spawnFloat(CX,CY+58,'がまん x'+state.patience,COL.nogoEdge); }
    } else if(state.type===1 && !state.judged){
      state.combo = 0;
    }
    state.phase='gap'; state.t=0;
  }

  canvas.addEventListener('pointerdown', function(ev){
    var rect = canvas.getBoundingClientRect();
    var mx = (ev.clientX-rect.left)*(W/rect.width);
    var my = (ev.clientY-rect.top)*(H/rect.height);
    lastInput = now; auto = false;
    if(state.phase==='lit'){
      var n = nodes[state.active];
      var dx=mx-n.x, dy=my-n.y;
      if(dx*dx+dy*dy <= (NODE_R+14)*(NODE_R+14)){
        judgeTap(state.active, false);
      }
    }
  });

  function update(dt){
    now += dt;
    if(!auto && now-lastInput>3.2){ auto = true; }

    if(state.phase==='lit'){
      state.t += dt;
      if(auto && state.type===1){
        ghostDelay -= dt;
        var n = nodes[state.active];
        ghost.tx = n.x; ghost.ty = n.y; ghost.show = Math.min(1, ghost.show+dt*5);
        if(ghostDelay<=0 && !state.judged){
          ghost.press = 1;
          judgeTap(state.active, true);
        }
      } else if(auto && state.type===0){
        ghost.tx = CX + Math.cos(now*0.7)*70;
        ghost.ty = CY + Math.sin(now*0.9)*70;
        ghost.show = Math.min(1, ghost.show+dt*4);
      }
      if(state.t>=state.dur){ expire(); }
    } else if(state.phase==='clear'){
      state.t += dt;
      if(state.t>=0.28){ state.phase='gap'; state.t=0; }
    } else if(state.phase==='gap'){
      state.t += dt;
      ghost.show = Math.max(0, ghost.show-dt*3);
      if(state.t>=state.gap){ pickNext(); }
    } else {
      pickNext();
    }

    ghost.x += (ghost.tx-ghost.x)*Math.min(1,dt*9);
    ghost.y += (ghost.ty-ghost.y)*Math.min(1,dt*9);
    ghost.press = Math.max(0, ghost.press-dt*4);

    state.flash = Math.max(0, state.flash-dt*3);
    state.dispScore += (state.score-state.dispScore)*Math.min(1,dt*8);

    for(var i=parts.length-1;i>=0;i--){
      var p=parts[i];
      p.life-=dt*1.6; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt; p.vx*=0.96;
      if(p.life<=0){ parts.splice(i,1); }
    }
    for(var j=rings.length-1;j>=0;j--){
      var rg=rings[j]; rg.life-=dt*1.8; rg.r+=dt*160;
      if(rg.life<=0){ rings.splice(j,1); }
    }
    for(var k=floats.length-1;k>=0;k--){
      var f=floats[k]; f.life-=dt*1.1; f.y-=dt*34;
      if(f.life<=0){ floats.splice(k,1); }
    }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawCourt(){
    ctx.fillStyle = COL.court;
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = COL.courtLine; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(CX,CY,RING+NODE_R+22,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle = COL.courtRing; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(CX,CY,RING,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([6,10]);
    ctx.beginPath(); ctx.arc(CX,CY,RING-NODE_R-14,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawNode(n, isActive){
    if(!isActive){
      ctx.fillStyle = COL.idle;
      ctx.strokeStyle = COL.idleEdge; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(n.x,n.y,NODE_R,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = COL.courtRing;
      ctx.beginPath(); ctx.arc(n.x,n.y,NODE_R*0.32,0,Math.PI*2); ctx.fill();
      return;
    }
    var prog = state.phase==='lit' ? state.t/state.dur : 1;
    var pulse = 1 + Math.sin(now*10)*0.04;
    if(state.type===1){
      ctx.fillStyle = COL.goGlow;
      ctx.beginPath(); ctx.arc(n.x,n.y,NODE_R*(1.5+0.15*Math.sin(now*8)),0,Math.PI*2); ctx.fill();
      ctx.fillStyle = COL.go; ctx.strokeStyle = COL.goEdge; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(n.x,n.y,NODE_R*pulse,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = COL.white; ctx.lineWidth = 6; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(n.x,n.y,NODE_R*0.5,0,Math.PI*2); ctx.stroke();
    } else {
      ctx.fillStyle = COL.nogoGlow;
      ctx.beginPath(); ctx.arc(n.x,n.y,NODE_R*(1.5+0.15*Math.sin(now*8)),0,Math.PI*2); ctx.fill();
      ctx.fillStyle = COL.nogo; ctx.strokeStyle = COL.nogoEdge; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(n.x,n.y,NODE_R*pulse,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = COL.white; ctx.lineWidth = 7; ctx.lineCap='round';
      var d = NODE_R*0.42;
      ctx.beginPath();
      ctx.moveTo(n.x-d,n.y-d); ctx.lineTo(n.x+d,n.y+d);
      ctx.moveTo(n.x+d,n.y-d); ctx.lineTo(n.x-d,n.y+d);
      ctx.stroke();
    }
    ctx.lineCap='butt';
    if(state.phase==='lit'){
      ctx.strokeStyle = state.type===1?COL.goEdge:COL.nogoEdge;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(n.x,n.y,NODE_R+9,-Math.PI/2,-Math.PI/2+(1-prog)*Math.PI*2);
      ctx.stroke();
    }
  }

  function drawGhost(){
    if(ghost.show<=0.02){ return; }
    ctx.globalAlpha = ghost.show*0.9;
    var pr = 1 - ghost.press*0.25;
    ctx.fillStyle = 'rgba(20,64,54,0.16)';
    ctx.beginPath(); ctx.arc(ghost.x,ghost.y+2,20*pr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = COL.white; ctx.strokeStyle = COL.goEdge; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(ghost.x,ghost.y,15*pr,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = COL.goEdge;
    ctx.beginPath(); ctx.arc(ghost.x,ghost.y,6*pr,0,Math.PI*2); ctx.fill();
    if(ghost.press>0.02){
      ctx.strokeStyle = COL.go; ctx.lineWidth=3; ctx.globalAlpha = ghost.show*ghost.press;
      ctx.beginPath(); ctx.arc(ghost.x,ghost.y,26-ghost.press*8,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD(){
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    roundRect(CX-118,CY-70,236,140,18); ctx.fill();
    ctx.strokeStyle = COL.courtRing; ctx.lineWidth=2; roundRect(CX-118,CY-70,236,140,18); ctx.stroke();

    ctx.fillStyle = COL.ink; ctx.font='bold 20px system-ui,sans-serif';
    ctx.fillText('SCORE', CX, CY-46);
    ctx.font='bold 46px system-ui,sans-serif'; ctx.fillStyle = COL.go;
    ctx.fillText(String(Math.round(state.dispScore)), CX, CY-8);

    ctx.font='bold 16px system-ui,sans-serif';
    ctx.fillStyle = COL.ink;
    ctx.fillText('COMBO', CX-58, CY+38);
    ctx.fillText('がまん', CX+58, CY+38);
    ctx.font='bold 26px system-ui,sans-serif';
    ctx.fillStyle = state.combo>0?COL.gold:COL.idleEdge;
    ctx.fillText('x'+state.combo, CX-58, CY+60);
    ctx.fillStyle = state.patience>0?COL.nogoEdge:COL.idleEdge;
    ctx.fillText('x'+state.patience, CX+58, CY+60);
  }

  function drawFx(){
    for(var i=0;i<rings.length;i++){
      var rg=rings[i];
      ctx.globalAlpha = Math.max(0,rg.life);
      ctx.strokeStyle = rg.col; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(rg.x,rg.y,rg.r,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    for(var j=0;j<parts.length;j++){
      var p=parts[j];
      ctx.globalAlpha = Math.max(0,p.life);
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for(var k=0;k<floats.length;k++){
      var f=floats[k];
      ctx.globalAlpha = Math.max(0,Math.min(1,f.life*1.4));
      ctx.font='bold 24px system-ui,sans-serif'; ctx.fillStyle=f.col;
      ctx.fillText(f.text,f.x,f.y);
    }
    ctx.globalAlpha = 1;
  }

  function render(){
    drawCourt();
    for(var i=0;i<NODE_COUNT;i++){ if(i!==state.active){ drawNode(nodes[i], false); } }
    if(state.active>=0 && (state.phase==='lit')){ drawNode(nodes[state.active], true); }
    else if(state.active>=0){ drawNode(nodes[state.active], false); }
    drawFx();
    drawHUD();
    drawGhost();
    if(state.flash>0){
      ctx.fillStyle = state.flashCol;
      ctx.globalAlpha = state.flash*0.5;
      ctx.fillRect(0,0,W,H);
      ctx.globalAlpha = 1;
    }
  }

  var last = 0;
  function loop(ts){
    if(!last){ last=ts; }
    var dt = Math.min(0.05,(ts-last)/1000); last=ts;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  pickNext();
  requestAnimationFrame(loop);
})();
</script>
</div>
</body>
</html>
