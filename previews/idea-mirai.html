<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>みらいキャッチ 〜さきよみディフェンス〜 — プレビュー</title><style>:root{--surface-0:#f4f3ee;--surface-1:#fcfcfb;--surface-2:#fff;--text-primary:#0b0b0b;--text-secondary:#52514e;--text-muted:#898781;--text-accent:#185fa5;--border:rgba(11,11,11,.10);--radius:8px}@media(prefers-color-scheme:dark){:root{--surface-0:#1a1a19;--surface-1:#232322;--surface-2:#2b2b29;--text-primary:#fff;--text-secondary:#c3c2b7;--text-muted:#8f8e88;--text-accent:#85b7eb;--border:rgba(255,255,255,.12)}}
html,body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.page{max-width:740px;margin:0 auto;padding:18px 16px 40px;box-sizing:border-box}</style></head><body><div class="page">
<h2 class="mirai-sr-only">端から射出される球の未来の通り道を先読みし、キャッチャーを先回りさせてインターセプトする子ども向け予測ディフェンスゲームのミニプレビュー。</h2>
<style>
.mirai-sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.mirai-frame{background:var(--surface-1);border-radius:12px;padding:12px;box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
.mirai-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:2px 2px 10px;}
.mirai-title{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:.02em;}
.mirai-hint{font-size:12px;color:var(--text-secondary);}
.mirai-hint b{color:var(--text-primary);}
.mirai-tag{font-size:11px;color:var(--text-muted);}
.mirai-canvas{display:block;width:100%;height:auto;border-radius:8px;touch-action:none;cursor:pointer;}
</style>
<div class="mirai-frame">
  <div class="mirai-head">
    <span class="mirai-title">🛡️ みらいキャッチ <span class="mirai-tag">〜さきよみディフェンス〜</span></span>
    <span class="mirai-hint">👆 <b>未来の通り道</b>へ先回り！ 予測ゴースト（点線）を読んでキャッチ</span>
  </div>
  <canvas id="mirai-canvas" class="mirai-canvas" width="1040" height="620" style="display:block;width:100%;height:auto;border-radius:8px;"></canvas>
</div>
<script>
(function(){
  var canvas=document.getElementById("mirai-canvas");
  if(!canvas||!canvas.getContext){return;}
  var ctx=canvas.getContext("2d");
  if(!ctx){return;}
  var W=1040,H=620;

  var GOAL_X=118;
  var pad={x:GOAL_X+46,y:H/2,tx:GOAL_X+46,ty:H/2,w:24,h:118};
  var PAD_MINY=90,PAD_MAXY=H-70;
  var PAD_MINX=GOAL_X+40,PAD_MAXX=W-260;

  var ball=null;
  var particles=[];
  var flashes=[];
  var score=0,streak=0;
  var toast=null;
  var demo=true,idleTimer=0;
  var spawnTimer=0.35;
  var demoTargetY=H/2,demoTargetX=pad.x;

  function rnd(a,b){return a+Math.random()*(b-a);}
  function clamp(v,a,b){return v<a?a:(v>b?b:v);}

  function spawnBall(){
    var side=["top","left","right"][Math.floor(Math.random()*3)];
    var sx,sy,vx,vy;
    var curve=Math.random()<0.34;
    var speed=rnd(360,470);
    var aimX=rnd(GOAL_X+120,W-360);
    var aimY=rnd(150,H-150);
    if(side==="top"){ sx=rnd(W*0.35,W*0.9); sy=-10; }
    else if(side==="left"){ sx=W-14; sy=rnd(140,H-140); }
    else { sx=W-14; sy=rnd(140,H-140); aimY=rnd(150,H-150); }
    if(side==="left"||side==="right"){ sx=W-14; sy=rnd(130,H-130); }
    if(side==="top"){ sx=rnd(W*0.4,W*0.92); sy=-12; }
    var dx=aimX-sx, dy=aimY-sy;
    var d=Math.sqrt(dx*dx+dy*dy)||1;
    vx=dx/d*speed; vy=dy/d*speed;
    ball={
      x:sx,y:sy,vx:vx,vy:vy,r:15,
      curve:curve, curveA:(Math.random()<0.5?-1:1)*rnd(1.6,2.6),
      curveApplied:false,age:0,alive:true,
      ghostT:0.42, trail:[],
      color:curve?"#ff8a3d":"#37c2ff"
    };
    computeDemoTarget();
  }

  function futurePos(t){
    if(!ball)return{x:pad.x,y:pad.y};
    var steps=Math.max(1,Math.floor(t/0.016));
    var x=ball.x,y=ball.y,vx=ball.vx,vy=ball.vy,age=ball.age,applied=ball.curveApplied;
    var dt=t/steps;
    for(var i=0;i<steps;i++){
      age+=dt;
      if(ball.curve&&!applied&&age>0.34){
        var sp=Math.sqrt(vx*vx+vy*vy);
        var ang=Math.atan2(vy,vx)+ball.curveA*0.5;
        vx=Math.cos(ang)*sp; vy=Math.sin(ang)*sp; applied=true;
      }
      x+=vx*dt; y+=vy*dt;
    }
    return{x:x,y:y};
  }

  function computeDemoTarget(){
    if(!ball){return;}
    var tHit=(pad.x-ball.x)/ball.vx;
    if(tHit<0.05||tHit>3){ tHit=0.6; }
    var f=futurePos(clamp(tHit,0.15,2.2));
    demoTargetX=clamp(f.x, PAD_MINX+30, PAD_MAXX);
    demoTargetY=clamp(f.y+rnd(-8,8), PAD_MINY, PAD_MAXY);
  }

  function burst(x,y,color,n){
    for(var i=0;i<n;i++){
      var a=Math.random()*Math.PI*2, s=rnd(60,300);
      particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.35,0.7),t:0,color:color,r:rnd(2,5)});
    }
  }

  function intercept(early){
    if(!ball)return;
    var pts=early?150:100;
    score+=pts; streak++;
    burst(ball.x,ball.y,ball.color,early?24:16);
    flashes.push({x:pad.x,y:pad.y,t:0,life:0.3,early:early});
    if(early){ toast={txt:"はやよみ！ +150 ✨",t:0,life:1.0,x:ball.x,y:ball.y-30}; }
    else if(streak>0&&streak%3===0){ toast={txt:streak+"れんぞく！ 🔥",t:0,life:1.0,x:ball.x,y:ball.y-30}; }
    ball.alive=false;
    spawnTimer=0.28;
  }

  function conceded(){
    streak=0;
    burst(GOAL_X,ball.y,"#ff5470",14);
    flashes.push({x:GOAL_X+30,y:ball.y,t:0,life:0.35,miss:true});
    toast={txt:"ぬけた… 💨",t:0,life:0.8,x:GOAL_X+70,y:ball.y-24};
    ball.alive=false;
    spawnTimer=0.4;
  }

  function update(dt){
    if(demo){ idleTimer=0; }
    else { idleTimer+=dt; if(idleTimer>3.2){ demo=true; } }

    if(!ball){
      spawnTimer-=dt;
      if(spawnTimer<=0){ spawnBall(); }
    } else if(ball.alive){
      ball.age+=dt;
      if(ball.curve&&!ball.curveApplied&&ball.age>0.34){
        var sp=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
        var ang=Math.atan2(ball.vy,ball.vx)+ball.curveA*0.5;
        ball.vx=Math.cos(ang)*sp; ball.vy=Math.sin(ang)*sp; ball.curveApplied=true;
        if(demo){ computeDemoTarget(); }
      }
      ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;
      ball.ghostT-=dt;
      ball.trail.push({x:ball.x,y:ball.y});
      if(ball.trail.length>10)ball.trail.shift();

      if(ball.y< -30||ball.y>H+30){ ball.alive=false; spawnTimer=0.3; }

      var tToPad=(pad.x-ball.x)/(ball.vx||-1);
      var early=(tToPad>0.28&&Math.abs(pad.ty-ball.y)<pad.h*0.5&&Math.abs(pad.tx-pad.x)<6);

      var dxp=ball.x-pad.x, dyp=ball.y-pad.y;
      if(Math.abs(dxp)<pad.w*0.5+ball.r && Math.abs(dyp)<pad.h*0.5+ball.r){
        var wasEarly=early && Math.abs(pad.x-pad.tx)<10 && Math.abs(pad.y-pad.ty)<26;
        intercept(wasEarly);
      } else if(ball.x<=GOAL_X+ball.r){
        conceded();
      }
    }
    if(ball&&!ball.alive){ ball=null; }

    if(demo){
      pad.tx=demoTargetX; pad.ty=demoTargetY;
    }
    pad.x+=(pad.tx-pad.x)*Math.min(1,dt*11);
    pad.y+=(pad.ty-pad.y)*Math.min(1,dt*11);
    pad.x=clamp(pad.x,PAD_MINX,PAD_MAXX);
    pad.y=clamp(pad.y,PAD_MINY,PAD_MAXY);

    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i]; p.t+=dt;
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.92; p.vy*=0.92;
      if(p.t>=p.life)particles.splice(i,1);
    }
    for(var j=flashes.length-1;j>=0;j--){ flashes[j].t+=dt; if(flashes[j].t>=flashes[j].life)flashes.splice(j,1); }
    if(toast){ toast.t+=dt; toast.y-=dt*18; if(toast.t>=toast.life)toast=null; }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function draw(){
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#11294a"); g.addColorStop(1,"#0a1830");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    ctx.strokeStyle="rgba(255,255,255,0.05)"; ctx.lineWidth=1;
    for(var gx=0;gx<W;gx+=52){ ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke(); }
    for(var gy=0;gy<H;gy+=52){ ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke(); }

    var gg=ctx.createLinearGradient(0,0,GOAL_X+50,0);
    gg.addColorStop(0,"rgba(255,84,112,0.35)"); gg.addColorStop(1,"rgba(255,84,112,0)");
    ctx.fillStyle=gg; ctx.fillRect(0,0,GOAL_X+50,H);
    ctx.strokeStyle="rgba(255,120,140,0.8)"; ctx.setLineDash([10,8]); ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(GOAL_X,40); ctx.lineTo(GOAL_X,H-40); ctx.stroke(); ctx.setLineDash([]);
    ctx.save(); ctx.translate(30,H/2); ctx.rotate(-Math.PI/2);
    ctx.fillStyle="rgba(255,160,175,0.9)"; ctx.font="600 18px system-ui,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("GOAL LINE",0,0); ctx.restore();

    for(var k=0;k<flashes.length;k++){
      var fl=flashes[k]; var a=1-fl.t/fl.life;
      ctx.strokeStyle=fl.miss?"rgba(255,84,112,"+a+")":(fl.early?"rgba(120,255,190,"+a+")":"rgba(120,220,255,"+a+")");
      ctx.lineWidth=4; ctx.beginPath();
      ctx.arc(fl.x,fl.y,18+fl.t*90,0,Math.PI*2); ctx.stroke();
    }

    if(ball){
      if(ball.ghostT>0){
        var ga=clamp(ball.ghostT/0.42,0,1)*0.75;
        ctx.strokeStyle="rgba(255,255,255,"+(ga*0.7)+")"; ctx.setLineDash([7,7]); ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(ball.x,ball.y);
        var f1=futurePos(0.55);
        if(ball.curve){ var fm=futurePos(0.34); ctx.lineTo(fm.x,fm.y); }
        ctx.lineTo(f1.x,f1.y); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle="rgba(255,255,255,"+(ga*0.5)+")";
        ctx.beginPath(); ctx.arc(f1.x,f1.y,ball.r*1.05,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle="rgba(255,255,255,"+(ga*0.8)+")"; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(f1.x,f1.y,ball.r*1.05,0,Math.PI*2); ctx.stroke();
      }
      for(var t=0;t<ball.trail.length;t++){
        var tr=ball.trail[t]; var ta=(t/ball.trail.length)*0.4;
        ctx.fillStyle=ball.color.replace(")",","+ta+")").replace("rgb","rgba");
        ctx.fillStyle="rgba("+(ball.curve?"255,138,61":"55,194,255")+","+ta+")";
        ctx.beginPath(); ctx.arc(tr.x,tr.y,ball.r*(0.4+t/ball.trail.length*0.5),0,Math.PI*2); ctx.fill();
      }
      ctx.save();
      ctx.shadowColor=ball.color; ctx.shadowBlur=18;
      ctx.fillStyle=ball.color;
      ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle="rgba(255,255,255,0.85)";
      ctx.beginPath(); ctx.arc(ball.x-ball.r*0.3,ball.y-ball.r*0.3,ball.r*0.32,0,Math.PI*2); ctx.fill();
      if(ball.curve){
        ctx.fillStyle="#fff"; ctx.font="12px system-ui,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText("↺",ball.x,ball.y);
      }
    }

    var early=false;
    if(ball&&ball.vx<0){
      var tToPad=(pad.x-ball.x)/ball.vx;
      if(tToPad>0.28&&Math.abs(pad.ty-ball.y)<pad.h*0.5){ early=true; }
    }
    ctx.save();
    ctx.shadowColor= demo?"rgba(120,220,255,0.8)":"rgba(140,255,190,0.85)";
    ctx.shadowBlur=16;
    var pg=ctx.createLinearGradient(pad.x-pad.w/2,0,pad.x+pad.w/2,0);
    if(demo){ pg.addColorStop(0,"#4fb8ff"); pg.addColorStop(1,"#2b7fe0"); }
    else { pg.addColorStop(0,"#6effb0"); pg.addColorStop(1,"#28d98a"); }
    ctx.fillStyle=pg;
    roundRect(pad.x-pad.w/2,pad.y-pad.h/2,pad.w,pad.h,10); ctx.fill();
    ctx.restore();
    ctx.fillStyle="rgba(255,255,255,0.9)"; ctx.font="18px system-ui,sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(demo?"🤖":"🧤",pad.x,pad.y);

    if(demo){
      ctx.strokeStyle="rgba(255,255,255,0.35)"; ctx.setLineDash([4,6]); ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(pad.tx,pad.ty,pad.h*0.42,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    }

    for(var m=0;m<particles.length;m++){
      var pp=particles[m]; var pa=1-pp.t/pp.life;
      ctx.globalAlpha=pa; ctx.fillStyle=pp.color;
      ctx.beginPath(); ctx.arc(pp.x,pp.y,pp.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    if(toast){
      var toa=clamp(toast.life-toast.t,0,0.35)/0.35;
      ctx.globalAlpha=toa; ctx.fillStyle="#fff";
      ctx.font="700 26px system-ui,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.shadowColor="rgba(0,0,0,0.5)"; ctx.shadowBlur=8;
      ctx.fillText(toast.txt,clamp(toast.x,140,W-140),toast.y);
      ctx.shadowBlur=0; ctx.globalAlpha=1;
    }

    roundRect(W-232,20,212,96,14); ctx.fillStyle="rgba(0,0,0,0.32)"; ctx.fill();
    ctx.textAlign="left"; ctx.textBaseline="alphabetic";
    ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.font="13px system-ui,sans-serif";
    ctx.fillText("SCORE",W-210,48);
    ctx.fillStyle="#fff"; ctx.font="700 34px system-ui,sans-serif";
    ctx.fillText(String(score),W-210,86);
    ctx.fillStyle="#ffd45e"; ctx.font="600 15px system-ui,sans-serif";
    ctx.fillText("🔥 "+streak,W-92,86);

    ctx.textAlign="left";
    ctx.fillStyle=demo?"rgba(120,220,255,0.95)":"rgba(140,255,190,0.95)";
    ctx.font="600 14px system-ui,sans-serif";
    roundRect(24,H-46,demo?176:150,30,15);
    ctx.fillStyle="rgba(0,0,0,0.3)"; ctx.fill();
    ctx.fillStyle=demo?"rgba(150,225,255,0.98)":"rgba(150,255,200,0.98)";
    ctx.fillText(demo?"🤖 じどうデモ さいせい中":"🧤 あなたが プレイ中",36,H-25);
  }

  var last=performance.now();
  function loop(now){
    var dt=Math.min(0.05,(now-last)/1000); last=now;
    update(dt); draw();
    requestAnimationFrame(loop);
  }

  function pointTo(e){
    var rect=canvas.getBoundingClientRect();
    var cx=(e.clientX!==undefined?e.clientX:(e.touches&&e.touches[0].clientX));
    var cy=(e.clientY!==undefined?e.clientY:(e.touches&&e.touches[0].clientY));
    var x=(cx-rect.left)/rect.width*W;
    var y=(cy-rect.top)/rect.height*H;
    demo=false; idleTimer=0;
    pad.tx=clamp(x,PAD_MINX,PAD_MAXX);
    pad.ty=clamp(y,PAD_MINY,PAD_MAXY);
  }
  var dragging=false;
  canvas.addEventListener("pointerdown",function(e){ dragging=true; pointTo(e); e.preventDefault(); });
  canvas.addEventListener("pointermove",function(e){ if(dragging){ pointTo(e); } });
  window.addEventListener("pointerup",function(){ dragging=false; });

  requestAnimationFrame(loop);
})();
</script>
</div></body></html>
