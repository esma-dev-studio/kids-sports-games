<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>よけろ！フェイント・ダッシュ — プレビュー</title><style>:root{--surface-0:#f4f3ee;--surface-1:#fcfcfb;--surface-2:#fff;--text-primary:#0b0b0b;--text-secondary:#52514e;--text-muted:#898781;--text-accent:#185fa5;--border:rgba(11,11,11,.10);--radius:8px}@media(prefers-color-scheme:dark){:root{--surface-0:#1a1a19;--surface-1:#232322;--surface-2:#2b2b29;--text-primary:#fff;--text-secondary:#c3c2b7;--text-muted:#8f8e88;--text-accent:#85b7eb;--border:rgba(255,255,255,.12)}}
html,body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.page{max-width:740px;margin:0 auto;padding:18px 16px 40px;box-sizing:border-box}</style></head><body><div class="page">
<h2 class="feint-sr-only">上から迫るドリブラーの予備動作（体の傾き・肩・つま先と視線の矢印）を読み、踏み込む前に左右どちらへ動くか先回りして守るタイミングゲームのミニプレビュー。放置中はお手本が自動でプレイします。</h2>
<style>
.feint-sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.feint-frame{background:var(--surface-1);border-radius:12px;padding:12px;max-width:100%;box-sizing:border-box;}
.feint-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:2px 4px 10px;flex-wrap:wrap;}
.feint-title{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:.02em;}
.feint-hint{font-size:12px;color:var(--text-secondary);}
.feint-hint b{color:var(--text-primary);font-weight:600;}
.feint-tag{font-size:11px;color:var(--text-muted);}
.feint-canvas{display:block;width:100%;height:auto;border-radius:8px;touch-action:none;cursor:pointer;}
</style>
<div class="feint-frame">
  <div class="feint-head">
    <span class="feint-title">よけろ！フェイント・ダッシュ ⚡🛡️</span>
    <span class="feint-hint"><b>左右タップ / ← →</b>で先回りブロック</span>
  </div>
  <canvas id="feint-canvas" class="feint-canvas" width="1040" height="620" aria-hidden="true"></canvas>
  <div class="feint-head" style="margin:8px 4px 0;">
    <span class="feint-tag">🤖 放置でお手本が自動プレイ</span>
    <span class="feint-tag">予備動作を読んで踏み込む前に動こう</span>
  </div>
</div>
<script>
(function(){
  var cv = document.getElementById("feint-canvas");
  if(!cv || !cv.getContext){ return; }
  var ctx = cv.getContext("2d");
  if(!ctx){ return; }
  var W = cv.width, H = cv.height;

  var COL = {
    bgTop:"#1b2440", bgBot:"#233056", floor:"#2e3f6e",
    line:"#4a5f96", laneEdge:"#7d93cf",
    guard:"#37d0c0", guardDark:"#1f9e91",
    ball:"#ff9a3c", ballDark:"#e06d15",
    dribBody:"#ff6b8a", dribDark:"#d43e63", dribHead:"#ffd9c2",
    tell:"#ffe14d", good:"#7CF5A0", bad:"#ff738a",
    text:"#eef3ff", textDim:"#c3cdec", ghost:"#8fd0ff"
  };

  var GK = { x: W*0.5, targetX: W*0.5, y: H-96, w:120, dir:0, lungeT:0 };
  var LANE = { left: W*0.30, mid: W*0.5, right: W*0.70 };

  var score = 0, best = 0, combo = 0;
  var parts = [];
  var flash = 0, flashCol = COL.good;

  var auto = true, lastInput = -99999, now = 0;

  var drib = null;
  var STATE = { WAIT:0, TELL:1, DRIVE:2, RESULT:3 };
  var phase = STATE.WAIT, phaseT = 0;
  var guardCommitted = 0;
  var ghostReactAt = 0, ghostDone = false;
  var resultGood = false;

  function rnd(a,b){ return a + Math.random()*(b-a); }

  function spawnDrib(){
    var goRight = Math.random() < 0.5;
    var feint = Math.random() < 0.4;
    var tellDir = feint ? (goRight ? -1 : 1) : (goRight ? 1 : -1);
    drib = {
      x: W*0.5, y: 70, driveDir: goRight?1:-1, tellDir: tellDir,
      feint: feint, lean:0, targetLean:0, shoulder:0, footAmt:0,
      driveX:0
    };
    phase = STATE.WAIT; phaseT = 0;
    guardCommitted = 0; resultGood=false;
    ghostDone = false;
    ghostReactAt = rnd(0.34, 0.66);
  }

  function resetGuard(){ GK.x = W*0.5; GK.targetX = W*0.5; GK.dir=0; GK.lungeT=0; }

  function commit(dir){
    if(phase===STATE.RESULT) return;
    guardCommitted = dir;
    GK.dir = dir;
    GK.targetX = dir<0 ? LANE.left : LANE.right;
    GK.lungeT = 1;
  }

  function burst(x,y,col,n){
    for(var i=0;i<n;i++){
      var a = Math.random()*Math.PI*2, sp = rnd(2,7);
      parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:1,col:col,r:rnd(3,7)});
    }
  }

  function judge(){
    var success = (guardCommitted !== 0) && (guardCommitted === drib.driveDir);
    resultGood = success;
    var landX = drib.driveDir<0 ? LANE.left : LANE.right;
    if(success){
      score += 10 + combo*2; combo++;
      flash = 1; flashCol = COL.good;
      burst(landX, GK.y-20, COL.good, 22);
      burst(GK.x, GK.y-30, COL.guard, 10);
    } else {
      combo = 0;
      flash = 1; flashCol = COL.bad;
      burst(landX, GK.y+10, COL.bad, 16);
    }
    if(score>best) best=score;
  }

  var canvasScale = 1;
  function toCanvasX(clientX){
    var r = cv.getBoundingClientRect();
    return (clientX - r.left) * (W / r.width);
  }

  cv.addEventListener("pointerdown", function(e){
    e.preventDefault();
    var cx = toCanvasX(e.clientX);
    lastInput = now; auto = false;
    commit(cx < W*0.5 ? -1 : 1);
  }, {passive:false});

  window.addEventListener("keydown", function(e){
    if(e.key==="ArrowLeft" || e.key==="ArrowRight"){
      lastInput = now; auto = false;
      commit(e.key==="ArrowLeft" ? -1 : 1);
      e.preventDefault();
    }
  });

  function updateGhost(dt, p){
    if(!auto) return;
    if(!ghostDone && phase===STATE.TELL && phaseT >= ghostReactAt){
      ghostDone = true;
      commit(drib.driveDir);
    }
  }

  function drawBackground(){
    var g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, COL.bgTop); g.addColorStop(1, COL.bgBot);
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

    ctx.fillStyle = COL.floor;
    ctx.beginPath();
    ctx.moveTo(W*0.14, H); ctx.lineTo(W*0.36, 40);
    ctx.lineTo(W*0.64, 40); ctx.lineTo(W*0.86, H);
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle = COL.laneEdge; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(W*0.14, H); ctx.lineTo(W*0.36, 40); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W*0.86, H); ctx.lineTo(W*0.64, 40); ctx.stroke();

    ctx.strokeStyle = COL.line; ctx.lineWidth = 2;
    for(var i=1;i<=4;i++){
      var t=i/5;
      var ly = 40 + (H-40)*t;
      var lxL = W*0.36 + (W*0.14 - W*0.36)*t;
      var lxR = W*0.64 + (W*0.86 - W*0.64)*t;
      ctx.beginPath(); ctx.moveTo(lxL,ly); ctx.lineTo(lxR,ly); ctx.stroke();
    }
    var midDX = (W*0.5 - W*0.5);
    ctx.setLineDash([10,12]); ctx.strokeStyle="rgba(125,147,207,0.5)";
    ctx.beginPath(); ctx.moveTo(W*0.5,40); ctx.lineTo(W*0.5,H); ctx.stroke();
    ctx.setLineDash([]);

    ctx.strokeStyle = COL.laneEdge; ctx.lineWidth=6; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(W*0.5-70, 46); ctx.lineTo(W*0.5+70,46);
    ctx.arc(W*0.5, 46, 48, 0, Math.PI, false); ctx.stroke();
    ctx.lineCap="butt";
  }

  function drawGuard(){
    var x = GK.x, y = GK.y;
    var lean = GK.dir * Math.min(1,GK.lungeT) * 10;
    ctx.save();
    ctx.translate(x,y);
    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.beginPath(); ctx.ellipse(0, 30, 46, 12, 0, 0, Math.PI*2); ctx.fill();
    ctx.rotate(lean*Math.PI/180);

    ctx.fillStyle = COL.guardDark;
    ctx.fillRect(-34, 8, 20, 30);
    ctx.fillRect(14, 8, 20, 30);
    ctx.fillStyle = COL.guard;
    roundRect(-30,-34,60,52,14); ctx.fill();

    ctx.fillStyle = COL.guardDark;
    var armY = -20, reach = 40 + Math.min(1,GK.lungeT)*18;
    ctx.save(); ctx.translate(-28, armY); ctx.rotate(-0.5 - Math.min(1,GK.lungeT)*0.5);
    roundRect(-10,0,20,reach,10); ctx.fill(); ctx.restore();
    ctx.save(); ctx.translate(28, armY); ctx.rotate(0.5 + Math.min(1,GK.lungeT)*0.5);
    roundRect(-10,0,20,reach,10); ctx.fill(); ctx.restore();

    ctx.fillStyle = COL.dribHead;
    ctx.beginPath(); ctx.arc(0,-52,17,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = COL.guard;
    ctx.beginPath(); ctx.arc(0,-58,18,Math.PI,0); ctx.fill();
    ctx.fillStyle="#22303f";
    ctx.beginPath(); ctx.arc(-6,-50,2.4,0,Math.PI*2); ctx.arc(6,-50,2.4,0,Math.PI*2); ctx.fill();

    ctx.restore();

    if(GK.lungeT>0.02){
      ctx.strokeStyle="rgba(55,208,192,"+(GK.lungeT*0.6)+")";
      ctx.lineWidth=5;
      ctx.beginPath();
      ctx.arc(x, y-14, 62, GK.dir<0?Math.PI*0.7:Math.PI*0.05, GK.dir<0?Math.PI*1.05:Math.PI*0.4, false);
      ctx.stroke();
    }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawDribbler(){
    if(!drib) return;
    var x = drib.x, y = drib.y;
    ctx.save();
    ctx.translate(x,y);

    ctx.fillStyle="rgba(0,0,0,0.28)";
    ctx.beginPath(); ctx.ellipse(0, 62, 44, 12, 0, 0, Math.PI*2); ctx.fill();

    var lean = drib.lean;
    var footShift = drib.footAmt * 30 * drib.tellDir;
    ctx.strokeStyle = COL.dribDark; ctx.lineWidth=15; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(-12,30); ctx.lineTo(-12 - drib.footAmt*8*drib.tellDir, 60); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12,30); ctx.lineTo(12 + footShift, 60); ctx.stroke();
    ctx.lineCap="butt";

    ctx.rotate(lean*Math.PI/180);

    ctx.fillStyle = COL.dribBody;
    roundRect(-32,-30,64,60,16); ctx.fill();

    var shoU = drib.shoulder * 10;
    ctx.fillStyle = COL.dribDark;
    var loShoulder = drib.tellDir;
    var sL = -34, sR = 34;
    ctx.save(); ctx.translate(sL, -22 + (loShoulder<0? -shoU : shoU));
    ctx.rotate(-0.3); roundRect(-9,0,18,46,9); ctx.fill(); ctx.restore();
    ctx.save(); ctx.translate(sR, -22 + (loShoulder>0? -shoU : shoU));
    ctx.rotate(0.3); roundRect(-9,0,18,46,9); ctx.fill(); ctx.restore();

    ctx.fillStyle = COL.dribHead;
    var headX = drib.tellDir * drib.footAmt * 6;
    ctx.beginPath(); ctx.arc(headX,-50,18,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = COL.dribDark;
    ctx.beginPath(); ctx.arc(headX,-56,19,Math.PI,0); ctx.fill();

    ctx.fillStyle="#3a2230";
    var gazeX = headX + drib.tellDir * (4 + drib.footAmt*5);
    ctx.beginPath(); ctx.arc(gazeX-5,-49,2.6,0,Math.PI*2); ctx.arc(gazeX+5,-49,2.6,0,Math.PI*2); ctx.fill();

    ctx.restore();

    var by = y + 46, bx = x + drib.tellDir*(20 + drib.footAmt*18) + drib.driveX*0.4;
    var bob = Math.sin(now*0.02)*4;
    var bg = ctx.createRadialGradient(bx-4, by-4+bob, 2, bx, by+bob, 15);
    bg.addColorStop(0, COL.ball); bg.addColorStop(1, COL.ballDark);
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(bx, by+bob, 14, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle="rgba(0,0,0,0.3)"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(bx, by+bob, 14, -0.4, 0.9); ctx.stroke();
  }

  function drawTells(){
    if(!drib) return;
    if(phase===STATE.TELL){
      var pulse = 0.5 + 0.5*Math.sin(now*0.02);
      var ax = drib.x + drib.tellDir*70;
      var ay = drib.y + 6;
      ctx.save();
      ctx.globalAlpha = 0.55 + 0.45*pulse;
      ctx.fillStyle = COL.tell;
      var d = drib.tellDir;
      ctx.beginPath();
      ctx.moveTo(ax + d*26, ay);
      ctx.lineTo(ax, ay-16);
      ctx.lineTo(ax, ay-6);
      ctx.lineTo(ax - d*24, ay-6);
      ctx.lineTo(ax - d*24, ay+6);
      ctx.lineTo(ax, ay+6);
      ctx.lineTo(ax, ay+16);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = COL.tell;
      ctx.font = "bold 18px system-ui, sans-serif";
      ctx.textAlign="center";
      ctx.fillText("よく見て！", drib.x, drib.y-92);
      ctx.restore();
    }
  }

  function drawParticles(){
    for(var i=0;i<parts.length;i++){
      var p=parts[i];
      ctx.globalAlpha = Math.max(0,p.life);
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  function drawHUD(){
    ctx.textAlign="left";
    ctx.fillStyle=COL.text;
    ctx.font="bold 30px system-ui, sans-serif";
    ctx.fillText("SCORE "+score, 28, 46);
    ctx.font="bold 16px system-ui, sans-serif";
    ctx.fillStyle=COL.textDim;
    ctx.fillText("BEST "+best, 30, 70);

    if(combo>=2){
      ctx.textAlign="right";
      ctx.fillStyle=COL.tell;
      ctx.font="bold 26px system-ui, sans-serif";
      ctx.fillText(combo+" COMBO!", W-28, 46);
    }

    if(auto){
      ctx.save();
      ctx.textAlign="right";
      ctx.globalAlpha=0.85;
      ctx.fillStyle=COL.ghost;
      ctx.font="bold 15px system-ui, sans-serif";
      ctx.fillText("🤖 AUTO DEMO", W-28, 72);
      ctx.restore();
    }

    ctx.textAlign="center";
    ctx.fillStyle=COL.textDim;
    ctx.font="14px system-ui, sans-serif";
    var msg = "画面の左右をタップ / ← → で先回りブロック";
    if(phase===STATE.RESULT){
      msg = resultGood ? "ナイスブロック！ 🛡️✨" : (drib && drib.feint ? "フェイントに引っかかった！ 逆だったね" : "抜かれた！ 予備動作をよく見よう");
    }
    ctx.fillText(msg, W*0.5, H-18);
  }

  function drawCommitMarks(){
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.lineWidth = 3;
    ctx.strokeStyle = (guardCommitted<0)?COL.guard:"rgba(125,147,207,0.4)";
    dashArc(LANE.left, GK.y-14, 46, guardCommitted<0);
    ctx.strokeStyle = (guardCommitted>0)?COL.guard:"rgba(125,147,207,0.4)";
    dashArc(LANE.right, GK.y-14, 46, guardCommitted>0);
    ctx.restore();
  }
  function dashArc(x,y,r,active){
    ctx.setLineDash(active?[]:[6,8]);
    ctx.globalAlpha = active?0.6:0.25;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }

  var lastT = 0;
  function loop(t){
    if(!lastT) lastT = t;
    var dt = Math.min(40, t-lastT)/1000; lastT = t; now = t;

    if(!auto && (now - lastInput) > 4500){ auto = true; }

    phaseT += dt;
    if(!drib){ spawnDrib(); }

    if(phase===STATE.WAIT){
      if(phaseT > 0.55){ phase=STATE.TELL; phaseT=0; }
    } else if(phase===STATE.TELL){
      var tp = Math.min(1, phaseT/1.15);
      drib.lean = drib.tellDir * tp * 18;
      drib.shoulder = tp;
      drib.footAmt = tp;
      drib.y = 70 + tp*30;
      updateGhost(dt);
      if(phaseT > 1.25){ phase=STATE.DRIVE; phaseT=0; }
    } else if(phase===STATE.DRIVE){
      var dp = Math.min(1, phaseT/0.42);
      drib.driveX = drib.driveDir * dp * (W*0.2);
      drib.x = W*0.5 + drib.driveX;
      drib.y = 100 + dp*(GK.y - 150);
      drib.lean = drib.tellDir*18*(1-dp) + drib.driveDir*22*dp;
      drib.footAmt = 1;
      if(phaseT > 0.42){
        judge();
        phase=STATE.RESULT; phaseT=0;
      }
    } else if(phase===STATE.RESULT){
      if(resultGood){
        drib.y += 2;
        drib.x += (GK.x - drib.x)*0.06;
      } else {
        drib.y += dt*420;
        drib.x += drib.driveDir*dt*120;
      }
      if(phaseT>1.0){
        drib=null;
        resetGuard();
      }
    }

    GK.x += (GK.targetX - GK.x)*0.28;
    if(GK.lungeT>0){ GK.lungeT -= dt*1.6; if(GK.lungeT<0)GK.lungeT=0; }

    for(var i=parts.length-1;i>=0;i--){
      var p=parts[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.28; p.vx*=0.98;
      p.life-=dt*1.5;
      if(p.life<=0) parts.splice(i,1);
    }
    if(flash>0){ flash -= dt*2.2; if(flash<0)flash=0; }

    drawBackground();
    drawCommitMarks();
    drawTells();
    drawDribbler();
    drawGuard();
    drawParticles();

    if(flash>0){
      ctx.save();
      ctx.globalAlpha = flash*0.28;
      ctx.fillStyle = flashCol;
      ctx.fillRect(0,0,W,H);
      ctx.restore();
    }

    drawHUD();

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</div></body></html>
