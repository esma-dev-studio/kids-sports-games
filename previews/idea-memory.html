<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>おぼえてパス！ ライトメモリー・コート — プレビュー</title><style>:root{--surface-0:#f4f3ee;--surface-1:#fcfcfb;--surface-2:#fff;--text-primary:#0b0b0b;--text-secondary:#52514e;--text-muted:#898781;--text-accent:#185fa5;--border:rgba(11,11,11,.10);--radius:8px}@media(prefers-color-scheme:dark){:root{--surface-0:#1a1a19;--surface-1:#232322;--surface-2:#2b2b29;--text-primary:#fff;--text-secondary:#c3c2b7;--text-muted:#8f8e88;--text-accent:#85b7eb;--border:rgba(255,255,255,.12)}}
html,body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.page{max-width:740px;margin:0 auto;padding:18px 16px 40px;box-sizing:border-box}</style></head><body><div class="page">
<h2 class="memory-sr-only">俯瞰コートに味方が背番号付きで点灯し消えたあと、記憶をもとに番号順の位置をタップしてパスの光線をつなぐ記憶ゲームのミニプレビュー。放置中はお手本ゴーストが自動で正しくプレイします。</h2>
<style>
.memory-sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.memory-frame{background:var(--surface-1);border-radius:12px;padding:12px;}
.memory-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:0 2px 8px;flex-wrap:wrap;}
.memory-title{font-size:15px;font-weight:500;color:var(--text-primary);}
.memory-hint{font-size:12px;color:var(--text-secondary);}
.memory-hint b{font-weight:500;color:var(--text-primary);}
</style>
<div class="memory-frame">
  <div class="memory-head">
    <span class="memory-title">おぼえてパス！ ライトメモリー・コート</span>
    <span class="memory-hint"><b>タップ</b>で背番号の小さい順に位置を選択・放置で自動デモ</span>
  </div>
  <canvas id="memory-canvas" width="1040" height="620" style="display:block;width:100%;height:auto;border-radius:8px;"></canvas>
</div>
<script>
(function(){
  var canvas=document.getElementById("memory-canvas");
  if(!canvas||!canvas.getContext){return;}
  var ctx=canvas.getContext("2d");
  var W=1040,H=620;

  var COL_BG_TOP="#0e2a44",COL_BG_BOT="#0a1f33";
  var COL_COURT="#123a5c",COL_LINE="rgba(150,205,255,0.35)";
  var COL_ALLY="#ffd24a",COL_ALLY_DIM="#3a5772";
  var COL_PASS="#7ee6ff",COL_TEXT="#eaf6ff";
  var COL_GOOD="#5dcaa5",COL_BAD="#ff6b6b",COL_GHOST="#ff9ee0";

  var PHASE_SHOW=0,PHASE_HOLD=1,PHASE_PLAY=2,PHASE_WIN=3;

  var state={
    phase:PHASE_SHOW,
    tPhase:0,
    players:[],
    count:3,
    selected:0,
    auto:true,
    idleT:0,
    ghostT:0,
    ghostTarget:-1,
    particles:[],
    flash:0,
    winPulse:0,
    round:1
  };

  function rand(a,b){return a+Math.random()*(b-a);}

  function courtRect(){
    var m=70;
    return {x:m,y:m,w:W-m*2,h:H-m*2};
  }

  function newRound(n){
    state.count=n;
    state.players=[];
    var cr=courtRect();
    var tries=0;
    while(state.players.length<n && tries<400){
      tries++;
      var px=rand(cr.x+70,cr.x+cr.w-70);
      var py=rand(cr.y+70,cr.y+cr.h-70);
      var ok=true;
      for(var i=0;i<state.players.length;i++){
        var dx=state.players[i].x-px,dy=state.players[i].y-py;
        if(dx*dx+dy*dy<150*150){ok=false;break;}
      }
      if(ok){state.players.push({x:px,y:py,num:state.players.length+1,done:false,lit:0});}
    }
    for(var k=0;k<state.players.length;k++){state.players[k].num=k+1;}
    state.phase=PHASE_SHOW;
    state.tPhase=0;
    state.selected=0;
    state.flash=0;
    state.winPulse=0;
    state.ghostTarget=-1;
    state.ghostT=0;
  }

  function addParticles(x,y,color,cnt){
    for(var i=0;i<cnt;i++){
      var a=rand(0,Math.PI*2),sp=rand(1.5,5.5);
      state.particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color:color,r:rand(2,5)});
    }
  }

  function playerByNum(n){
    for(var i=0;i<state.players.length;i++){if(state.players[i].num===n){return state.players[i];}}
    return null;
  }

  function tryPick(px,py){
    if(state.phase!==PHASE_PLAY){return;}
    var want=state.selected+1;
    var hit=-1,hd=1e9;
    for(var i=0;i<state.players.length;i++){
      var p=state.players[i];
      if(p.done){continue;}
      var dx=p.x-px,dy=p.y-py,d=dx*dx+dy*dy;
      if(d<52*52 && d<hd){hd=d;hit=i;}
    }
    if(hit<0){return;}
    var chosen=state.players[hit];
    if(chosen.num===want){
      chosen.done=true;
      state.selected++;
      addParticles(chosen.x,chosen.y,COL_PASS,14);
      if(state.selected>=state.players.length){
        state.phase=PHASE_WIN;state.tPhase=0;state.winPulse=1;
        for(var q=0;q<state.players.length;q++){addParticles(state.players[q].x,state.players[q].y,COL_GOOD,10);}
      }
    }else{
      state.flash=1;
      addParticles(px,py,COL_BAD,10);
      for(var j=0;j<state.players.length;j++){state.players[j].done=false;}
      state.selected=0;
    }
  }

  function onPointer(ev){
    var rect=canvas.getBoundingClientRect();
    var sx=W/rect.width,sy=H/rect.height;
    var px=(ev.clientX-rect.left)*sx,py=(ev.clientY-rect.top)*sy;
    state.auto=false;
    state.idleT=0;
    state.ghostTarget=-1;
    if(state.phase===PHASE_PLAY){
      tryPick(px,py);
    }else if(state.phase===PHASE_WIN){
      // let win animation continue
    }
  }
  canvas.addEventListener("pointerdown",onPointer);

  function updateAuto(dt){
    if(state.phase===PHASE_PLAY){
      state.ghostT+=dt;
      if(state.ghostTarget<0){
        state.ghostTarget=state.selected+1;
        state.ghostT=0;
      }
      var tp=playerByNum(state.ghostTarget);
      if(tp && state.ghostT>0.55){
        tryPick(tp.x,tp.y);
        state.ghostTarget=-1;
        state.ghostT=0;
      }
    }
  }

  var last=performance.now();
  function loop(now){
    var dt=Math.min(0.05,(now-last)/1000);
    last=now;
    step(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function step(dt){
    state.tPhase+=dt;
    if(!state.auto){
      state.idleT+=dt;
      if(state.idleT>4){state.auto=true;}
    }

    if(state.phase===PHASE_SHOW){
      var per=0.42;
      var shown=Math.floor(state.tPhase/per);
      for(var i=0;i<state.players.length;i++){
        state.players[i].lit=(i<shown)?Math.min(1,state.players[i].lit+dt*6):Math.min(1,state.players[i].lit+ (i===shown?dt*6:0));
      }
      if(state.tPhase>per*state.players.length+0.5){
        state.phase=PHASE_HOLD;state.tPhase=0;
      }
    }else if(state.phase===PHASE_HOLD){
      for(var h=0;h<state.players.length;h++){state.players[h].lit=Math.max(0,state.players[h].lit-dt*2.2);}
      if(state.tPhase>0.9){state.phase=PHASE_PLAY;state.tPhase=0;state.ghostTarget=-1;}
    }else if(state.phase===PHASE_WIN){
      state.winPulse=Math.max(0,state.winPulse-dt*0.7);
      if(state.tPhase>1.7){
        state.round++;
        var next=state.count+1;if(next>5){next=3;}
        newRound(next);
      }
    }

    if(state.auto){updateAuto(dt);}

    state.flash=Math.max(0,state.flash-dt*3);

    for(var p=state.particles.length-1;p>=0;p--){
      var pt=state.particles[p];
      pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=0.94;pt.vy*=0.94;pt.life-=dt*1.6;
      if(pt.life<=0){state.particles.splice(p,1);}
    }
  }

  function roundRectPath(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawCourt(){
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,COL_BG_TOP);g.addColorStop(1,COL_BG_BOT);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    var cr=courtRect();
    ctx.fillStyle=COL_COURT;
    roundRectPath(cr.x,cr.y,cr.w,cr.h,18);ctx.fill();
    ctx.strokeStyle=COL_LINE;ctx.lineWidth=2.5;
    roundRectPath(cr.x,cr.y,cr.w,cr.h,18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cr.x+cr.w/2,cr.y);ctx.lineTo(cr.x+cr.w/2,cr.y+cr.h);ctx.stroke();
    ctx.beginPath();ctx.arc(cr.x+cr.w/2,cr.y+cr.h/2,58,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(cr.x,cr.y+cr.h/2,80,-Math.PI/2,Math.PI/2);ctx.stroke();
    ctx.beginPath();ctx.arc(cr.x+cr.w,cr.y+cr.h/2,80,Math.PI/2,Math.PI*1.5);ctx.stroke();
  }

  function drawPasses(){
    var pts=[];
    for(var n=1;n<=state.selected;n++){var p=playerByNum(n);if(p){pts.push(p);}}
    if(pts.length<2){return;}
    ctx.lineCap="round";
    ctx.strokeStyle=COL_PASS;ctx.lineWidth=6;
    ctx.shadowColor=COL_PASS;ctx.shadowBlur=16;
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(var i=1;i<pts.length;i++){ctx.lineTo(pts[i].x,pts[i].y);}
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  function drawPlayers(){
    var t=performance.now()/1000;
    for(var i=0;i<state.players.length;i++){
      var p=state.players[i];
      var showNum=(state.phase===PHASE_SHOW||state.phase===PHASE_HOLD)&&p.lit>0.02;
      var isDone=p.done;
      var baseR=30;
      var pulse=isDone?1+0.12*Math.sin(t*6):1;

      if(showNum){
        ctx.globalAlpha=Math.min(1,p.lit);
        ctx.fillStyle=COL_ALLY;
        ctx.shadowColor=COL_ALLY;ctx.shadowBlur=22*p.lit;
        ctx.beginPath();ctx.arc(p.x,p.y,baseR,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
        ctx.globalAlpha=1;
      }else if(isDone){
        ctx.fillStyle=COL_GOOD;
        ctx.shadowColor=COL_GOOD;ctx.shadowBlur=18;
        ctx.beginPath();ctx.arc(p.x,p.y,baseR*pulse,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      }else{
        ctx.fillStyle=COL_ALLY_DIM;
        ctx.beginPath();ctx.arc(p.x,p.y,baseR*0.6,0,Math.PI*2);ctx.fill();
      }

      if(showNum){
        ctx.globalAlpha=Math.min(1,p.lit);
        ctx.fillStyle="#1a2740";
        ctx.font="700 30px sans-serif";
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(String(p.num),p.x,p.y+1);
        ctx.fillStyle=COL_TEXT;
        ctx.font="700 22px sans-serif";
        ctx.fillText("#"+p.num,p.x,p.y-baseR-16);
        ctx.globalAlpha=1;
      }
      if(isDone){
        ctx.fillStyle="#083b2e";
        ctx.font="700 26px sans-serif";
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(String(p.num),p.x,p.y+1);
      }
    }
  }

  function drawGhost(){
    if(!state.auto||state.phase!==PHASE_PLAY||state.ghostTarget<0){return;}
    var tp=playerByNum(state.ghostTarget);
    if(!tp){return;}
    var t=performance.now()/1000;
    var r=42+6*Math.sin(t*7);
    ctx.strokeStyle=COL_GHOST;ctx.lineWidth=3.5;
    ctx.setLineDash([8,7]);
    ctx.lineDashOffset=-t*30;
    ctx.beginPath();ctx.arc(tp.x,tp.y,r,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=COL_GHOST;
    ctx.font="600 15px sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("お手本",tp.x,tp.y-r-14);
  }

  function drawParticles(){
    for(var i=0;i<state.particles.length;i++){
      var pt=state.particles[i];
      ctx.globalAlpha=Math.max(0,pt.life);
      ctx.fillStyle=pt.color;
      ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*pt.life,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  function drawHud(){
    ctx.textAlign="left";ctx.textBaseline="alphabetic";
    ctx.fillStyle=COL_TEXT;ctx.font="600 24px sans-serif";
    ctx.fillText("味方 "+state.count+"人",30,44);
    ctx.fillStyle="rgba(234,246,255,0.7)";ctx.font="500 18px sans-serif";
    ctx.fillText("ラウンド "+state.round,180,44);

    var label="";
    if(state.phase===PHASE_SHOW){label="おぼえて！ 背番号が点灯中";}
    else if(state.phase===PHASE_HOLD){label="…消えます";}
    else if(state.phase===PHASE_PLAY){label=(state.auto?"お手本デモ中":"あなたの番")+"： #"+(state.selected+1)+" をタップ";}
    else if(state.phase===PHASE_WIN){label="ナイスパス！ 全員つないだ！";}
    ctx.textAlign="right";
    ctx.fillStyle=(state.phase===PHASE_WIN)?COL_GOOD:COL_TEXT;
    ctx.font="600 22px sans-serif";
    ctx.fillText(label,W-30,44);
    ctx.textAlign="left";

    if(state.auto){
      ctx.fillStyle="rgba(255,158,224,0.9)";
      ctx.font="600 16px sans-serif";
      ctx.textAlign="right";
      ctx.fillText("AUTO DEMO",W-30,H-28);
      ctx.textAlign="left";
    }
  }

  function draw(){
    drawCourt();
    if(state.flash>0){
      ctx.fillStyle="rgba(255,80,80,"+(0.32*state.flash)+")";
      ctx.fillRect(0,0,W,H);
    }
    drawPasses();
    drawPlayers();
    drawGhost();
    drawParticles();
    if(state.phase===PHASE_WIN&&state.winPulse>0){
      ctx.fillStyle="rgba(93,202,165,"+(0.22*state.winPulse)+")";
      ctx.fillRect(0,0,W,H);
    }
    drawHud();
  }

  newRound(3);
  requestAnimationFrame(loop);
})();
</script>
</div></body></html>
