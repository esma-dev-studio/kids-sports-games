<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>パスハンター 〜まわりを見ろ！〜 — プレビュー</title>
<style>
:root{
  --surface-0:#f4f3ee; --surface-1:#fcfcfb; --surface-2:#ffffff;
  --text-primary:#0b0b0b; --text-secondary:#52514e; --text-muted:#898781;
  --text-accent:#185fa5; --bg-accent:#e6f1fb;
  --border:rgba(11,11,11,0.10); --border-strong:rgba(11,11,11,0.18);
  --border-accent:#378add; --radius:8px;
}
@media (prefers-color-scheme:dark){
  :root{
    --surface-0:#1a1a19; --surface-1:#232322; --surface-2:#2b2b29;
    --text-primary:#ffffff; --text-secondary:#c3c2b7; --text-muted:#8f8e88;
    --text-accent:#85b7eb; --bg-accent:#0c447c;
    --border:rgba(255,255,255,0.12); --border-strong:rgba(255,255,255,0.22);
    --border-accent:#3a86dd;
  }
}
html,body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
.page{max-width:740px;margin:0 auto;padding:18px 16px 40px;box-sizing:border-box;}
</style>
</head>
<body>
<div class="page">
<h2 class="passhunter-sr-only">跳ね回る丸の中から、一瞬光ってマークされた味方を追いかけ、PASS!の合図でその味方を選んでパスを通す子ども向けの観察ゲームのプレビュー。</h2>
<div class="passhunter-frame">
  <div class="passhunter-head">
    <div class="passhunter-title">パスハンター <span class="passhunter-sub">〜まわりを見ろ！〜</span></div>
    <div class="passhunter-hint">合図「<span class="passhunter-msg" id="passhunter-msg">見つけろ</span>」／ SCORE <span id="passhunter-score">0</span>　—　青い味方をクリックでパス！</div>
  </div>
  <canvas id="passhunter-canvas" width="1040" height="620" style="display:block;width:100%;height:auto;border-radius:8px;touch-action:manipulation;"></canvas>
</div>
<style>
.passhunter-sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.passhunter-frame{background:var(--surface-1);border-radius:12px;padding:12px;max-width:680px;box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
.passhunter-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:9px;padding:0 2px;}
.passhunter-title{font-size:17px;font-weight:800;color:var(--text-primary);letter-spacing:.02em;}
.passhunter-sub{font-size:13px;font-weight:600;color:var(--text-secondary);margin-left:4px;}
.passhunter-hint{font-size:13px;color:var(--text-secondary);}
.passhunter-hint .passhunter-msg{font-weight:800;color:var(--text-primary);}
.passhunter-hint #passhunter-score{font-weight:800;color:var(--text-primary);}
</style>
<script>
(function(){
  var canvas = document.getElementById('passhunter-canvas');
  if(!canvas || !canvas.getContext){ return; }
  var ctx = canvas.getContext('2d');
  if(!ctx){ return; }
  var W = canvas.width, H = canvas.height;

  var scoreEl = document.getElementById('passhunter-score');
  var msgEl = document.getElementById('passhunter-msg');

  var COL = {
    field:'#3f9a5b', fieldDark:'#379051', line:'rgba(255,255,255,0.55)',
    ally:'#2f6fd8', allyDark:'#204e9c', enemy:'#d84a3f', enemyDark:'#9c3029',
    mark:'#ffd23f', ball:'#f4efe2', ballLine:'#8a7f66', arrow:'#c62f2f',
    passline:'#ffe680'
  };

  var R = 26;
  var balls = [];
  var particles = [];
  var arrows = [];
  var score = 0, combo = 0;
  var flash = 0;

  var PHASE = { MARK:0, TRACK:1, CALL:2, RESULT:3 };
  var phase = PHASE.MARK;
  var phaseT = 0;
  var targetIds = [];
  var resultGood = false;
  var passAnim = null;

  var auto = true;
  var lastInput = -99999;
  var now = 0;
  var ghost = { x:W/2, y:H/2, tx:W/2, ty:H/2, pickAt:0, picked:false };

  function rand(a,b){ return a + Math.random()*(b-a); }

  function spawnBalls(){
    balls = [];
    var n = 4 + ((Math.random()*3)|0) + 1;
    if(n>7) n=7;
    var enemyCount = 1 + ((Math.random()*2)|0);
    for(var i=0;i<n;i++){
      var ang = rand(0, Math.PI*2);
      var sp = rand(1.6, 2.9);
      balls.push({
        id:i,
        x:rand(R+30, W-R-30),
        y:rand(R+30, H-R-30),
        vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp,
        enemy: i<enemyCount,
        marked:false,
        pulse:0
      });
    }
    for(var k=balls.length-1;k>0;k--){
      var j=(Math.random()*(k+1))|0;
      var t=balls[k]; balls[k]=balls[j]; balls[j]=t;
    }
  }

  function allies(){
    var a=[]; for(var i=0;i<balls.length;i++){ if(!balls[i].enemy) a.push(balls[i]); }
    return a;
  }

  function newRound(){
    spawnBalls();
    var al = allies();
    var count = al.length>=4 ? (1 + ((Math.random()*2)|0)) : 1;
    if(count>al.length) count=al.length;
    for(var i=al.length-1;i>0;i--){
      var j=(Math.random()*(i+1))|0; var t=al[i]; al[i]=al[j]; al[j]=t;
    }
    targetIds = [];
    for(var m=0;m<count;m++){ targetIds.push(al[m].id); al[m].marked=true; al[m].pulse=1; }
    phase = PHASE.MARK; phaseT = 0;
    passAnim = null;
    ghost.picked = false;
    ghost.pickAt = rand(0.15, 0.6);
    arrows = [];
  }

  function byId(id){
    for(var i=0;i<balls.length;i++){ if(balls[i].id===id) return balls[i]; }
    return null;
  }

  function addBurst(x,y,c,n){
    for(var i=0;i<n;i++){
      var a=rand(0,Math.PI*2), s=rand(2,6);
      particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c:c,r:rand(3,6)});
    }
  }

  function spawnArrow(){
    var side=(Math.random()*4)|0;
    var x,y,vx,vy;
    var sp=rand(3.5,4.8);
    if(side===0){ x=-40; y=rand(H*0.2,H*0.8); vx=sp; vy=rand(-1,1); }
    else if(side===1){ x=W+40; y=rand(H*0.2,H*0.8); vx=-sp; vy=rand(-1,1); }
    else if(side===2){ x=rand(W*0.2,W*0.8); y=-40; vx=rand(-1,1); vy=sp; }
    else { x=rand(W*0.2,W*0.8); y=H+40; vx=rand(-1,1); vy=-sp; }
    arrows.push({x:x,y:y,vx:vx,vy:vy,life:1.6});
  }

  function selectAlly(ball){
    if(phase!==PHASE.CALL || !ball || passAnim) return;
    var good = targetIds.indexOf(ball.id)>=0 && !ball.enemy;
    resultGood = good;
    if(good){
      combo++;
      var gain = 100 + Math.min(combo,9)*20;
      score += gain;
      addBurst(ball.x, ball.y, COL.mark, 22);
      flash = 0.6;
      passAnim = { fromx:ghost.x, fromy:ghost.y, tox:ball.x, toy:ball.y, t:0, target:ball };
    } else {
      combo = 0;
      addBurst(ball.x, ball.y, COL.enemy, 14);
      resultGood = false;
      passAnim = { fromx:ghost.x, fromy:ghost.y, tox:ball.x, toy:ball.y, t:0, target:ball, bad:true };
    }
    if(scoreEl) scoreEl.textContent = score;
    phase = PHASE.RESULT; phaseT = 0;
  }

  function humanClick(px,py){
    lastInput = now;
    auto = false;
    if(phase===PHASE.CALL){
      var best=null, bd=99999;
      for(var i=0;i<balls.length;i++){
        var b=balls[i];
        var d=(b.x-px)*(b.x-px)+(b.y-py)*(b.y-py);
        if(d<bd){ bd=d; best=b; }
      }
      if(best && bd < (R+18)*(R+18)){ selectAlly(best); }
    }
  }

  canvas.addEventListener('pointerdown', function(e){
    var rect = canvas.getBoundingClientRect();
    var px = (e.clientX-rect.left) * (W/rect.width);
    var py = (e.clientY-rect.top) * (H/rect.height);
    humanClick(px,py);
  });

  function updateBalls(dt){
    for(var i=0;i<balls.length;i++){
      var b=balls[i];
      if(passAnim && b===passAnim.target){ continue; }
      b.x += b.vx*dt*60;
      b.y += b.vy*dt*60;
      if(b.x < R){ b.x=R; b.vx=Math.abs(b.vx); }
      if(b.x > W-R){ b.x=W-R; b.vx=-Math.abs(b.vx); }
      if(b.y < R){ b.y=R; b.vy=Math.abs(b.vy); }
      if(b.y > H-R){ b.y=H-R; b.vy=-Math.abs(b.vy); }
      if(b.pulse>0){ b.pulse -= dt*1.4; if(b.pulse<0)b.pulse=0; }
    }
  }

  function updateParticles(dt){
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.vy+=0.12;
      p.life-=dt*1.6;
      if(p.life<=0) particles.splice(i,1);
    }
  }

  function updateArrows(dt){
    for(var i=arrows.length-1;i>=0;i--){
      var a=arrows[i];
      a.x+=a.vx*dt*60; a.y+=a.vy*dt*60; a.life-=dt;
      if(a.life<=0 || a.x< -80 || a.x>W+80 || a.y< -80 || a.y>H+80) arrows.splice(i,1);
    }
  }

  function autoPlay(dt){
    if(phase===PHASE.CALL){
      var tg = byId(targetIds[0]);
      if(tg){ ghost.tx = tg.x; ghost.ty = tg.y; }
      if(!ghost.picked && phaseT > ghost.pickAt){
        ghost.picked = true;
        var chosen = byId(targetIds[0]);
        if(chosen) selectAlly(chosen);
      }
    } else if(phase===PHASE.TRACK || phase===PHASE.MARK){
      var t2 = byId(targetIds[0]);
      if(t2){ ghost.tx = t2.x; ghost.ty = t2.y; }
    }
  }

  function update(dt){
    phaseT += dt;
    updateBalls(dt);
    updateParticles(dt);
    updateArrows(dt);
    if(flash>0){ flash -= dt*1.8; if(flash<0)flash=0; }

    if(!auto && (now - lastInput) > 4.5){ auto = true; }
    if(auto){ autoPlay(dt); }

    var gspd = 8*dt;
    ghost.x += (ghost.tx-ghost.x)*Math.min(1,gspd);
    ghost.y += (ghost.ty-ghost.y)*Math.min(1,gspd);

    if(phase===PHASE.MARK){
      if(msgEl) msgEl.textContent = targetIds.length>1 ? 'この2人を覚えて！' : 'この味方を覚えて！';
      if(phaseT>1.1){
        for(var i=0;i<balls.length;i++){ balls[i].marked=false; }
        phase=PHASE.TRACK; phaseT=0;
      }
    } else if(phase===PHASE.TRACK){
      if(msgEl) msgEl.textContent = '追いかけろ…';
      if(phaseT>0.8 && arrows.length<2 && Math.random()<0.02){ spawnArrow(); }
      if(phaseT>2.6){ phase=PHASE.CALL; phaseT=0; }
    } else if(phase===PHASE.CALL){
      if(msgEl) msgEl.textContent = 'PASS! いま選べ！';
      if(arrows.length<2 && Math.random()<0.02){ spawnArrow(); }
      if(phaseT>3.2){
        combo=0;
        if(msgEl) msgEl.textContent = '時間切れ…';
        phase=PHASE.RESULT; phaseT=0; resultGood=false; passAnim=null;
      }
    } else if(phase===PHASE.RESULT){
      if(passAnim){
        passAnim.t += dt*2.2;
        if(passAnim.t>=1){ passAnim.t=1; }
        ghost.x = passAnim.fromx;
        ghost.y = passAnim.fromy;
        if(passAnim.t>=1 && !passAnim.done){
          passAnim.done=true;
          if(!passAnim.bad){ addBurst(passAnim.tox, passAnim.toy, COL.ball, 10); }
        }
      }
      if(msgEl){
        if(resultGood) msgEl.textContent = 'ナイスパス！';
        else if(!passAnim) msgEl.textContent = '時間切れ…';
        else msgEl.textContent = 'ミス！ 敵だった';
      }
      if(phaseT>1.4){ newRound(); }
    }
  }

  function drawField(){
    for(var i=0;i<10;i++){
      ctx.fillStyle = (i%2===0)? COL.field : COL.fieldDark;
      ctx.fillRect(0, i*(H/10), W, H/10);
    }
    ctx.strokeStyle = COL.line; ctx.lineWidth=4;
    ctx.strokeRect(30,30,W-60,H-60);
    ctx.beginPath(); ctx.moveTo(W/2,30); ctx.lineTo(W/2,H-30); ctx.stroke();
    ctx.beginPath(); ctx.arc(W/2,H/2,70,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(W/2,H/2,6,0,Math.PI*2); ctx.fillStyle=COL.line; ctx.fill();
    ctx.strokeRect(30, H/2-90, 70, 180);
    ctx.strokeRect(W-100, H/2-90, 70, 180);
  }

  function drawArrows(){
    for(var i=0;i<arrows.length;i++){
      var a=arrows[i];
      var ang=Math.atan2(a.vy,a.vx);
      ctx.save();
      ctx.translate(a.x,a.y); ctx.rotate(ang);
      ctx.globalAlpha = Math.min(1,a.life);
      ctx.fillStyle=COL.arrow;
      ctx.beginPath();
      ctx.moveTo(34,0); ctx.lineTo(4,-16); ctx.lineTo(4,-6);
      ctx.lineTo(-30,-6); ctx.lineTo(-30,6); ctx.lineTo(4,6); ctx.lineTo(4,16);
      ctx.closePath(); ctx.fill();
      ctx.restore();
      ctx.globalAlpha=1;
    }
  }

  function drawBall(b){
    if(b.marked){
      ctx.beginPath(); ctx.arc(b.x,b.y,R+9+Math.sin(now*8)*2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,210,63,0.35)'; ctx.fill();
      ctx.beginPath(); ctx.arc(b.x,b.y,R+7,0,Math.PI*2);
      ctx.strokeStyle=COL.mark; ctx.lineWidth=5; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(b.x+2,b.y+4,R,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fill();

    ctx.beginPath(); ctx.arc(b.x,b.y,R,0,Math.PI*2);
    ctx.fillStyle = b.enemy? COL.enemy : COL.ally; ctx.fill();
    ctx.lineWidth=4; ctx.strokeStyle = b.enemy? COL.enemyDark : COL.allyDark; ctx.stroke();

    if(b.enemy){
      ctx.lineWidth=5; ctx.strokeStyle='#ffffff';
      ctx.beginPath();
      ctx.moveTo(b.x-9,b.y-9); ctx.lineTo(b.x+9,b.y+9);
      ctx.moveTo(b.x+9,b.y-9); ctx.lineTo(b.x-9,b.y+9);
      ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(b.x,b.y,8,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill();
    }
  }

  function drawGhost(){
    var pulse = 4+Math.sin(now*6)*2;
    ctx.beginPath(); ctx.arc(ghost.x, ghost.y, R+16+pulse, 0, Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=3;
    ctx.setLineDash([10,8]); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(ghost.x, ghost.y-(R+22)); ctx.lineTo(ghost.x-9, ghost.y-(R+38));
    ctx.lineTo(ghost.x+9, ghost.y-(R+38)); ctx.closePath();
    ctx.fillStyle='#ffffff'; ctx.fill();
  }

  function drawPassBall(){
    if(passAnim){
      var pt = passAnim.t;
      var bx = passAnim.fromx + (passAnim.tox-passAnim.fromx)*pt;
      var by = passAnim.fromy + (passAnim.toy-passAnim.fromy)*pt - Math.sin(pt*Math.PI)*60;
      if(!passAnim.bad || pt<1){
        ctx.beginPath(); ctx.moveTo(passAnim.fromx,passAnim.fromy);
        ctx.lineTo(bx,by);
        ctx.strokeStyle=COL.passline; ctx.lineWidth=4; ctx.globalAlpha=0.7*(1-pt*0.4);
        ctx.setLineDash([12,8]); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha=1;
        ctx.beginPath(); ctx.arc(bx,by,13,0,Math.PI*2);
        ctx.fillStyle=COL.ball; ctx.fill();
        ctx.lineWidth=2; ctx.strokeStyle=COL.ballLine; ctx.stroke();
      }
    }
  }

  function draw(){
    drawField();
    drawPassBall();
    for(var i=0;i<balls.length;i++){ drawBall(balls[i]); }
    drawArrows();

    for(var p=0;p<particles.length;p++){
      var pa=particles[p];
      ctx.globalAlpha=Math.max(0,pa.life);
      ctx.beginPath(); ctx.arc(pa.x,pa.y,pa.r,0,Math.PI*2);
      ctx.fillStyle=pa.c; ctx.fill();
    }
    ctx.globalAlpha=1;

    drawGhost();

    if(flash>0){
      ctx.fillStyle='rgba(255,255,255,'+(flash*0.35)+')';
      ctx.fillRect(0,0,W,H);
    }

    if(phase===PHASE.CALL){
      ctx.font='bold 46px system-ui,sans-serif';
      ctx.textAlign='center';
      var sc=1+Math.sin(now*10)*0.05;
      ctx.save(); ctx.translate(W/2,72); ctx.scale(sc,sc);
      ctx.lineWidth=8; ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.strokeText('PASS!',0,0);
      ctx.fillStyle=COL.mark; ctx.fillText('PASS!',0,0); ctx.restore();
      ctx.textAlign='left';
    }

    ctx.font='bold 24px system-ui,sans-serif';
    ctx.textAlign='left';
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillText('SCORE '+score, 42, 52);
    ctx.fillStyle='#ffffff';
    ctx.fillText('SCORE '+score, 40, 50);
    if(combo>1){
      ctx.textAlign='right';
      ctx.fillStyle='rgba(0,0,0,0.35)';
      ctx.fillText('COMBO x'+combo, W-38, 52);
      ctx.fillStyle=COL.mark;
      ctx.fillText('COMBO x'+combo, W-40, 50);
      ctx.textAlign='left';
    }

    if(auto){
      ctx.font='bold 15px system-ui,sans-serif';
      ctx.textAlign='right';
      ctx.fillStyle='rgba(255,255,255,0.85)';
      ctx.fillText('AUTO DEMO', W-40, H-32);
      ctx.textAlign='left';
    }
  }

  var last = 0;
  function loop(ts){
    if(!last) last=ts;
    var dt=(ts-last)/1000; last=ts;
    if(dt>0.05) dt=0.05;
    now += dt;
    update(dt);
    ctx.clearRect(0,0,W,H);
    draw();
    requestAnimationFrame(loop);
  }

  newRound();
  requestAnimationFrame(loop);
})();
</script>
</div>
</body>
</html>
